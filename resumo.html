<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* ===== CONTAINER ===== */
.resumo-container{
width:92%;
max-width:420px;
margin:20px auto 120px;
display:flex;
flex-direction:column;
gap:16px;
}

/* ===== ROTA ===== */
.rota-box{
border-radius:20px;
padding:16px;
border:1px solid rgba(255,255,255,.1);
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.rota-col{
flex:1;
}

.rota-titulo{
font-size:12px;
opacity:.6;
}

.rota-nome{
font-weight:700;
}

.rota-end{
font-size:12px;
opacity:.6;
}

/* ===== CARD ===== */
.card-premium{
border-radius:20px;
padding:18px;
border:1px solid rgba(255,255,255,.1);
background:rgba(0,0,0,.6);
}

/* ===== GRID ===== */
.grid{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

.grid div{
flex:1;
text-align:center;
}

/* ===== TAXAS ===== */
.taxa{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px dashed rgba(255,255,255,.1);
}

/* ===== PAGAMENTO ===== */
.pagamento-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.pagamento{
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.1);
text-align:center;
cursor:pointer;
}

.pagamento.ativo{
border:1px solid #facc15;
}

/* ===== TOTAL ===== */
.total-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.total-box strong{
font-size:28px;
color:#facc15;
}

/* ===== BOTÕES ===== */
.botoes{
display:flex;
gap:10px;
}

.botoes button{
flex:1;
padding:14px;
border-radius:12px;
font-weight:bold;
border:none;
}

.btn-wpp{
background:#16a34a;
color:#fff;
}

.btn-pdf{
background:#facc15;
color:#000;
}

</style>
</head>

<body>

<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
</div>

<div class="resumo-container">

<!-- ROTA -->
<div class="rota-box" id="rotaBox"></div>

<!-- DETALHES -->
<div class="card-premium">
<h3>Detalhes selecionados</h3>
<div class="grid" id="detalhes"></div>
</div>

<!-- TAXAS -->
<div class="card-premium">
<h3>Taxas adicionais</h3>
<div id="taxas"></div>
</div>

<!-- PAGAMENTO -->
<div class="card-premium">
<h3>Forma de pagamento</h3>
<div class="pagamento-grid">
<div class="pagamento ativo" data="dinheiro">Dinheiro</div>
<div class="pagamento" data="pix">PIX</div>
<div class="pagamento" data="credito">Crédito</div>
<div class="pagamento" data="debito">Débito</div>
</div>
</div>

<!-- TOTAL -->
<div class="card-premium">
<div class="total-box">
<div>
<div>Total da viagem</div>
<strong id="total">R$ 0,00</strong>
</div>
<div id="resumoValores"></div>
</div>
</div>

<div class="botoes">
<button class="btn-wpp" onclick="wpp()">WhatsApp</button>
<button class="btn-pdf" onclick="pdf()">PDF</button>
</div>

</div>

<script>

/* TEMA */
(function(){
const tema = localStorage.getItem("rf_theme") || "dark";
document.body.setAttribute("data-theme", tema);
})();

/* MENU */
function abrirMenu(){
menu.classList.add("ativo");
menuOverlay.style.display="block";
}
function fecharMenu(){
menu.classList.remove("ativo");
menuOverlay.style.display="none";
}
function irPara(p){
window.location.href=p;
}

/* DADOS */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));
if(!d) window.location.href="home.html";

/* ROTA */
function montarRota(){

let html = `<div class="rota-item"><span>Origem:</span> ${d.origem}</div>`;

if(d.parada){
html += `<div class="rota-item"><span>Parada:</span> ${d.parada}</div>`;
}

html += `<div class="rota-item"><span>Destino:</span> ${d.destino}</div>`;

document.getElementById("rota").innerHTML = html;
}

/* NOTURNO CORRETO */
function adicionalNoturno(base){

if(!d.embarque) return 0;

const [h,m] = d.embarque.split(":").map(Number);
const hora = h + (m/60);

if(hora >= 22.5 || hora <= 5){

if(base <= 24.99) return 4.99;

return base * 0.35;
}

return 0;
}

/* CALCULO */
function calcular(){

let base = parseFloat(d.valor) || 0;
let taxas = 0;
let detalhe = "";

/* BASE */
detalhe += `<div class="linha"><span>Corrida</span><span>R$ ${base.toFixed(2)}</span></div>`;

/* NOTURNO */
const noturno = adicionalNoturno(base);
if(noturno > 0){
taxas += noturno;
detalhe += `<div class="linha"><span>Adicional Noturno</span><span>R$ ${noturno.toFixed(2)}</span></div>`;
}

/* TAXAS VINDAS DA HOME */
if(d.feira > 0){
taxas += +d.feira;
detalhe += `<div class="linha"><span>Feira</span><span>R$ ${(+d.feira).toFixed(2)}</span></div>`;
}

if(d.animal > 0){
taxas += +d.animal;
detalhe += `<div class="linha"><span>Animal</span><span>R$ ${(+d.animal).toFixed(2)}</span></div>`;
}

if(d.saidaPraia > 0){
taxas += +d.saidaPraia;
detalhe += `<div class="linha"><span>Saída Praia</span><span>R$ ${(+d.saidaPraia).toFixed(2)}</span></div>`;
}

if(d.espera > 5){
const t = 3 + ((d.espera-5)*0.6);
taxas += t;
detalhe += `<div class="linha"><span>Espera</span><span>R$ ${t.toFixed(2)}</span></div>`;
}

/* TOTAL */
let subtotal = base + taxas;

/* VEÍCULO */
if(d.categoria > 1){
const add = subtotal * (d.categoria - 1);
detalhe += `<div class="linha"><span>6 lugares</span><span>R$ ${add.toFixed(2)}</span></div>`;
subtotal *= d.categoria;
}

/* PAGAMENTO */
let pagamento = document.getElementById("pagamento").value;
let total = subtotal;

if(pagamento === "credito") total = subtotal / 0.95;
if(pagamento === "debito") total = subtotal / 0.98;

/* FINAL */
detalhe += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;

document.getElementById("detalhe").innerHTML = detalhe;
document.getElementById("valorFinal").innerText = "R$ " + total.toFixed(2);

localStorage.setItem("rf_total_final", total.toFixed(2));
}

document.getElementById("pagamento").addEventListener("change", calcular);

/* WHATSAPP */
function wpp(){

let total = localStorage.getItem("rf_total_final");

let msg = `🚗 *ORÇAMENTO RF*\n\n`;
msg += `📍 ${d.origem}\n`;
if(d.parada) msg += `⏳ ${d.parada}\n`;
msg += `🏁 ${d.destino}\n\n`;

msg += `💰 *Total: R$ ${parseFloat(total).toFixed(2)}*`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* PDF */
async function solicitar(){

try{

const total = localStorage.getItem("rf_total_final");

const payload = {
origem:d.origem,
parada:d.parada,
destino:d.destino,
total,
detalhes:"Resumo da viagem",
data:new Date().toLocaleDateString(),
hora:new Date().toLocaleTimeString(),
embarque:d.embarque,
desembarque:d.desembarque
};

const res = await fetch("https://backend-recibo-rf.onrender.com/gerar-recibo",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const r = await res.json();

window.location.href=`https://wa.me/?text=${encodeURIComponent("📄 Recibo:\n"+r.link)}`;

}catch(e){
alert("Erro ao gerar PDF");
}

}

/* INIT */
montarRota();
calcular();

</script>

</body>
</html>
