<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>
.container{max-width:420px;margin:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--card);border-radius:18px;padding:16px;border:1px solid var(--border);}
.titulo{font-weight:700;margin-bottom:10px;}
.linha{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px;}
.total-box{display:flex;justify-content:space-between;align-items:center;}
.total-valor{font-size:26px;font-weight:bold;color:var(--primary);}
.btn-row{display:flex;gap:10px;}
.btn{flex:1;padding:14px;border-radius:12px;border:none;font-weight:bold;}
.btn-wpp{background:#16a34a;color:#fff;}
.btn-pdf{background:var(--primary);color:#000;}
.rota{display:flex;flex-direction:column;gap:6px;}
</style>

</head>

<body>

<!-- HEADER -->
<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="window.location.href='configuracoes.html'">⚙️</div>
</div>

<div class="container">

<!-- ROTA -->
<div class="card rota" id="rota"></div>

<!-- DETALHES -->
<div class="card">
<div class="titulo">Detalhes selecionados</div>
<div class="linha"><span>Veículo</span><span id="veiculo"></span></div>
<div class="linha"><span>Embarque</span><span id="embarque"></span></div>
<div class="linha"><span>Desembarque</span><span id="desembarque"></span></div>
<div class="linha"><span>Obs</span><span id="obs"></span></div>
</div>

<!-- TAXAS -->
<div class="card">
<div class="titulo">Taxas adicionais</div>
<div id="taxas"></div>
</div>

<!-- PAGAMENTO -->
<div class="card">
<div class="titulo">Forma de pagamento</div>
<select id="pagamento">
<option value="dinheiro">Dinheiro</option>
<option value="pix">PIX</option>
<option value="credito">Crédito</option>
<option value="debito">Débito</option>
</select>
</div>

<!-- TOTAL -->
<div class="card total-box">
<div>
<div>Total da viagem</div>
<div class="total-valor" id="totalFinal"></div>
</div>

<div>
<div class="linha"><span>Base</span><span id="base"></span></div>
<div class="linha"><span>Taxas</span><span id="totalTaxas"></span></div>
</div>
</div>

<!-- BOTÕES -->
<div class="btn-row">
<button class="btn btn-wpp" onclick="wpp()">Orçamento WhatsApp</button>
<button class="btn btn-pdf" onclick="pdf()">Gerar PDF</button>
</div>

</div>

<script>

/* TEMA */
document.body.setAttribute("data-theme", localStorage.getItem("rf_theme") || "dark");

/* DADOS */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));
if(!d) location.href="home.html";

/* ROTA */
let rotaHTML = `<div>📍 ${d.origem}</div>`;
if(d.parada) rotaHTML += `<div>⏳ ${d.parada}</div>`;
rotaHTML += `<div>🏁 ${d.destino}</div>`;
document.getElementById("rota").innerHTML = rotaHTML;

/* DETALHES */
veiculo.innerText = d.categoria > 1 ? "6 lugares" : "4 lugares";
embarque.innerText = d.embarque || "-";
desembarque.innerText = d.desembarque || "-";
obs.innerText = d.obs || "-";

/* TAXAS */
let taxasHTML = "";
let totalTaxas = 0;

function addTaxa(nome, valor){
taxasHTML += `<div class="linha"><span>${nome}</span><span>R$ ${valor.toFixed(2)}</span></div>`;
totalTaxas += valor;
}

if(d.feira > 0) addTaxa("Feira", +d.feira);
if(d.animal > 0) addTaxa("Animal", +d.animal);
if(d.saidaPraia > 0) addTaxa("Saída Praia", +d.saidaPraia);

if(d.espera > 5){
let t = 3 + ((d.espera-5)*0.6);
addTaxa("Espera", t);
}

/* ADICIONAL NOTURNO */
function noturno(base){
if(!d.embarque) return 0;
let [h,m] = d.embarque.split(":").map(Number);
let hora = h + m/60;

if(hora >= 22.5 || hora <= 5){
if(base <= 24.99) return 4.99;
return base * 0.35;
}
return 0;
}

/* BASE */
let base = +d.valor;

/* NOTURNO */
let not = noturno(base);
if(not > 0){
addTaxa("Adicional Noturno", not);
}

/* RENDER TAXAS */
document.getElementById("taxas").innerHTML = taxasHTML;

/* TOTAL */
let subtotal = base + totalTaxas;

function calcular(){

let pagamento = document.getElementById("pagamento").value;
let total = subtotal;

if(pagamento === "credito") total = subtotal / 0.95;
if(pagamento === "debito") total = subtotal / 0.98;

document.getElementById("totalFinal").innerText = "R$ " + total.toFixed(2);
document.getElementById("base").innerText = "R$ " + base.toFixed(2);
document.getElementById("totalTaxas").innerText = "+ R$ " + totalTaxas.toFixed(2);

localStorage.setItem("rf_total_final", total.toFixed(2));
}

document.getElementById("pagamento").addEventListener("change", calcular);

calcular();

/* WHATSAPP */
function wpp(){

let total = localStorage.getItem("rf_total_final");

let msg = `🚗 *ORÇAMENTO RF*\n\n`;
msg += `📍 ${d.origem}\n`;
if(d.parada) msg += `⏳ ${d.parada}\n`;
msg += `🏁 ${d.destino}\n\n`;

msg += `🚘 ${veiculo.innerText}\n`;

if(d.embarque) msg += `🕒 ${d.embarque}\n`;
if(d.desembarque) msg += `🕓 ${d.desembarque}\n`;
if(d.obs) msg += `📝 ${d.obs}\n`;

msg += `\n💰 *Total: R$ ${parseFloat(total).toFixed(2)}*`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* PDF */
async function pdf(){

try{

let total = localStorage.getItem("rf_total_final");

const payload = {
origem:d.origem,
parada:d.parada,
destino:d.destino,
total,
detalhes:taxasHTML,
data:new Date().toLocaleDateString(),
hora:new Date().toLocaleTimeString(),
embarque:d.embarque,
desembarque:d.desembarque
};

const res = await fetch("https://backend-recibo-rf.onrender.com/gerar-recibo",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const r = await res.json();

window.location.href=`https://wa.me/?text=${encodeURIComponent("📄 Recibo:\n"+r.link)}`;

}catch(e){
alert("Erro PDF");
}

}

</script>

</body>
</html>
