<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF • Escritório Virtual</title>

<style>

/* =========================
🎯 THEME BASE (ALINHADO)
========================= */
:root{
  --bg-main:#0B0F14;
  --bg-soft:#0F141B;
  --primary:#3B82F6;
  --primary-soft:rgba(59,130,246,0.2);
  --text:#FFFFFF;
  --text-secondary:#9CA3AF;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

html,body{
  height:100%;
}

/* =========================
BODY
========================= */
body{
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
  background: radial-gradient(circle at top,#111827 0%,#020617 80%);
  animation:fadeIn .5s ease;
}

/* FUNDO CORPORATIVO */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle, var(--primary-soft), transparent 60%),
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,.02),
      rgba(255,255,255,.02) 1px,
      transparent 1px,
      transparent 12px
    );
  animation:bgRotate 30s linear infinite;
  top:-50%;
  left:-50%;
}

@keyframes bgRotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* =========================
CONTAINER
========================= */
.container{
  position:relative;
  text-align:center;
  z-index:2;
}

/* =========================
ANEL CORPORATIVO
========================= */
.radar{
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  border:1px solid rgba(59,130,246,.25);
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

.radar::before,
.radar::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:1px solid rgba(59,130,246,.2);
  animation:pulse 4s infinite;
}

.radar::after{
  animation-delay:2s;
}

@keyframes pulse{
  0%{
    transform:scale(.7);
    opacity:.6;
  }
  100%{
    transform:scale(1.6);
    opacity:0;
  }
}

/* =========================
GLOW
========================= */
.glow{
  position:absolute;
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle,var(--primary),transparent 70%);
  filter:blur(70px);
  opacity:.25;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  animation:glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse{
  0%,100%{opacity:.2;}
  50%{opacity:.4;}
}

/* =========================
LOGO
========================= */
.logo{
  width:140px;
  opacity:0;
  transform:scale(.9);
  animation:logoEnter .6s ease forwards, float 4s ease-in-out infinite 1s;
}

@keyframes logoEnter{
  to{
    opacity:1;
    transform:scale(1);
  }
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* =========================
TEXTOS
========================= */
.titulo{
  margin-top:20px;
  font-size:18px;
  font-weight:600;
  letter-spacing:.5px;
  opacity:0;
  animation:textFade 1s ease forwards 1.2s;
}

.tagline{
  margin-top:6px;
  font-size:13px;
  color:var(--text-secondary);
  opacity:0;
  animation:textFade 1s ease forwards 1.6s;
}

@keyframes textFade{
  to{opacity:1;}
}

/* =========================
PROGRESS
========================= */
.progress{
  margin-top:30px;
  width:220px;
  height:4px;
  background:rgba(255,255,255,.08);
  border-radius:6px;
  overflow:hidden;
  margin-left:auto;
  margin-right:auto;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  animation:load 4s ease forwards;
}

@keyframes load{
  to{width:100%;}
}

/* =========================
FADE
========================= */
.fade-out{
  animation:fadeOut .5s ease forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    transform:scale(.97);
  }
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

  <div class="radar"></div>
  <div class="glow"></div>

  <img src="icons/logo-1024.png" class="logo">

  <div class="titulo">
    Escritório Virtual RF
  </div>

  <div class="tagline">
    Mobilidade inteligente • Gestão profissional
  </div>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>

</div>

<script>

/* TRANSIÇÃO */
setTimeout(()=>{
  document.body.classList.add("fade-out");
},4000);

setTimeout(()=>{
  window.location.href="dashboard-motorista.html";
},4500);

</script>

</body>
</html>
