<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">

<style>

/* BASE */
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

/* CONTAINER */
.container{
  padding:16px;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.kpi-card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:16px;
  border-radius:16px;
}

.kpi-card span{
  font-size:12px;
  opacity:.6;
}

.kpi-card h2{
  margin:4px 0 0;
}

/* GRID PRINCIPAL */
.main-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
}

@media(max-width:768px){
  .main-grid{
    grid-template-columns:1fr;
  }
}

/* CARD */
.card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

.card-title{
  font-size:14px;
  margin-bottom:10px;
  opacity:.7;
}

/* RANKING */
.bonus-card{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#000;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

/* AÇÕES */
.acoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.acao-btn{
  background:#020617;
  border:1px solid #334155;
  padding:14px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
}

/* LISTA */
.item-corrida{
  padding:14px;
  border-radius:14px;
  background:#020617;
  border:1px solid #1e293b;
  margin-bottom:8px;
  transition:0.2s;
}

.item-corrida:hover{
  transform:scale(1.02);
  border-color:#22c55e;
}

.valor{
  color:#22c55e;
  font-weight:bold;
}

.data{
  font-size:12px;
  opacity:.6;
}

</style>

</head>

<body>

<div class="header">
  <span id="saudacao"></span>
  <div onclick="logout()">Sair</div>
</div>

<div class="container">

<!-- KPI -->
<div class="kpi-grid">
  <div class="kpi-card" id="kpiGanhos"></div>
  <div class="kpi-card" id="kpiCorridas"></div>
</div>

<!-- GRID -->
<div class="main-grid">

  <!-- ESQUERDA -->
  <div>

    <div class="card">
      <div class="card-title">Desempenho</div>
      <canvas id="grafico"></canvas>
    </div>

    <div class="card">
      <div class="card-title">Corridas</div>
      <div id="lista"></div>
    </div>

  </div>

  <!-- DIREITA -->
  <div>

    <div class="bonus-card" id="bonusCard"></div>

    <div class="acoes">
      <div class="acao-btn" onclick="ir('cadastro.html')">👤 Motorista</div>
      <div class="acao-btn" onclick="ir('cadastrar-corrida.html')">🚖 Corrida</div>
    </div>

  </div>

</div>

</div>

<script>

/* LOGIN */
if(!localStorage.getItem("motorista_id")){
  window.location.href="login-motorista.html";
}

const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

/* SAUDAÇÃO */
const hora = new Date().getHours();
let saudacao = hora < 12 ? "Bom dia" :
               hora < 18 ? "Boa tarde" : "Boa noite";

document.getElementById("saudacao").innerText =
`🚖 ${saudacao}, ${nome?.split(" ")[0] || ""}`;

/* DADOS */
let corridas = [];
let corridasGeral = [];
let chart = null;

/* BONUS */
async function carregarBonus(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("motorista_id");

  if(!data) return;

  const ranking = {};

  data.forEach(c=>{
    ranking[c.motorista_id] = (ranking[c.motorista_id] || 0) + 1;
  });

  const lista = Object.entries(ranking)
    .map(([id, total]) => ({ id, total }))
    .sort((a,b)=>b.total - a.total);

  const posicao = lista.findIndex(x => x.id == motoristaId) + 1;
  const minhasCorridas = ranking[motoristaId] || 0;

  bonusCard.innerHTML = `
    🏆 ${posicao || "-"}º lugar<br>
    ${minhasCorridas} corridas
  `;
}

/* CARREGAR */
async function carregar(){

  const { data: todas } = await window.supabaseClient
    .from("corridas")
    .select("*");

  corridasGeral = todas || [];

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId)
    .order("data_viagem",{ascending:false});

  corridas = data || [];

  gerar();
  gerarGrafico();
}

/* GERAR */
function gerar(){

  let total=0;

  corridas.forEach(c=>{
    total += Number(c.valor || 0);
  });

  document.getElementById("kpiGanhos").innerHTML =
    `<span>Ganhos</span><h2>R$ ${total.toFixed(2)}</h2>`;

  document.getElementById("kpiCorridas").innerHTML =
    `<span>Corridas</span><h2>${corridas.length}</h2>`;

  lista.innerHTML="";

  corridas.forEach(c=>{
    lista.innerHTML+=`
      <div class="item-corrida">
        <div>${c.origem} → ${c.destino}</div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>
        <div class="data">${c.data_viagem || "-"} • ${c.hora_viagem || ""}</div>
      </div>
    `;
  });
}

/* GRÁFICO */
function gerarGrafico(){

  let total = corridas.length;

  if(chart) chart.destroy();

  chart = new Chart(grafico,{
    type:"bar",
    data:{
      labels:["Corridas"],
      datasets:[{
        label:"Total",
        data:[total],
        backgroundColor:"#22c55e"
      }]
    }
  });
}

/* NAV */
function ir(p){
  window.location.href = p;
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="login-motorista.html";
}

/* START */
carregar();
carregarBonus();

</script>

</body>
</html>
