<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Viagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* BONUS */
.bonus-highlight{
padding:10px 15px;
}

.bonus-content{
background:linear-gradient(135deg,#111,#1f2937);
border-radius:16px;
padding:15px;
border:1px solid rgba(255,215,0,0.2);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
text-align:center;
}

.bonus-top{font-size:16px;font-weight:700;margin-bottom:5px;}
.bonus-top span{color:#FFD700;font-size:18px;}
.bonus-sub{font-size:13px;opacity:.8;margin-bottom:6px;}
.bonus-info{font-size:12px;color:#facc15;margin-bottom:10px;}

.bonus-content button{
background:#FFD700;
border:none;
padding:10px;
border-radius:10px;
font-weight:700;
width:100%;
}

/* SLIDER */
.slider{
width:100%;
overflow:hidden;
height:140px;
}

.slides{
display:flex;
transition:.4s;
height:100%;
}

.slide{
min-width:100%;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>

<div id="loading" class="loading">
<div class="loader"></div>
<span>Carregando rotas...</span>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>
<div class="menu-item" onclick="irPara('termos.html')">📜 Regras do Grupo RF</div>
<div class="menu-item" onclick="irPara('bonus.html')">📜 Regras dos Bônus</div>
<div class="menu-item" onclick="irPara('premiacao.html')">🏆 Ranking / Premiação</div>
<div class="menu-item" onclick="irPara('historico.html')">📊 Histórico</div>
<div class="menu-item" onclick="irPara('configuracoes.html')">⚙️ Configurações</div>
</div>

<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<!-- BANNER -->
<div class="bonus-highlight">
<div class="bonus-content">
<div class="bonus-top">🏆 Ganhe até <span>R$100</span></div>
<div class="bonus-sub">Seg–Sáb: R$50 | Domingo: R$50</div>
<div class="bonus-info">⚠️ Horário de pico conta mais!</div>
<button onclick="irPara('premiacao.html')">Ver ranking</button>
</div>
</div>

<!-- SLIDER -->
<div class="slider">
<div class="slides" id="slides">

<div class="slide">
<div class="slide-content">
<h2>Tabela RF</h2>
<button class="slide-btn" data-acao="origem">Começar</button>
</div>
</div>

<div class="slide">
<div class="slide-content">
<h2>Bônus Semanal</h2>
<button class="slide-btn" data-acao="premiacao">Ver ranking</button>
</div>
</div>

</div>
</div>

<div class="indicadores">
<div class="dotSlide ativo"></div>
<div class="dotSlide"></div>
</div>

<!-- APP -->
<div class="center">

<div class="card">

<div class="campo" id="origemBtn">
<div id="origemTexto">Selecionar origem</div>
</div>

<div class="campo" id="destinoBtn">
<div id="destinoTexto">Selecionar destino</div>
</div>

<div class="campo">
<div id="tipoCarroBtn">4 lugares</div>
<input type="hidden" id="tipoCarro" value="1">
</div>

</div>

</div>

<div class="bottom">
<button id="confirmar" disabled>Confirmar rota</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<input type="text" id="busca">
<div id="lista"></div>
</div>
</div>

<script>

/* INIT */
(async()=>{
await DataManager.carregar();
})();

/* SLIDER */
let slideIndex=0;
const slides=document.getElementById("slides");
const dots=document.querySelectorAll(".dotSlide");

setInterval(()=>{
slideIndex++;
if(slideIndex>=dots.length) slideIndex=0;
slides.style.transform=`translateX(-${slideIndex*100}%)`;
dots.forEach(d=>d.classList.remove("ativo"));
dots[slideIndex].classList.add("ativo");
},4000);

/* MENU */
function abrirMenu(){
menu.classList.add("ativo");
menuOverlay.style.display="block";
}
function fecharMenu(){
menu.classList.remove("ativo");
menuOverlay.style.display="none";
}
function irPara(p){window.location.href=p;}

/* SISTEMA RESTAURADO */
let origem=null,destino=null;

origemBtn.onclick=()=>{
const lista=DataManager.listarOrigens();
renderLista(lista,"origem");
};

destinoBtn.onclick=()=>{
if(!origem){alert("Selecione origem");return;}
const lista=DataManager.listarDestinos(origem);
renderLista(lista,"destino");
};

function renderLista(arr,tipo){
modal.style.display="flex";
lista.innerHTML="";
arr.forEach(item=>{
const div=document.createElement("div");
div.innerText=item;
div.onclick=()=>{
if(tipo==="origem"){
origem=item;
origemTexto.innerText=item;
}else{
destino=item;
destinoTexto.innerText=item;
}
modal.style.display="none";
confirmar.disabled=!(origem&&destino);
};
lista.appendChild(div);
});
}

confirmar.onclick=()=>{
const valor=DataManager.buscarValor(origem,destino);
localStorage.setItem("rf_corrida_temp",JSON.stringify({origem,destino,valor}));
window.location.href="resumo.html";
};

</script>

</body>
</html>
