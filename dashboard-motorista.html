<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* HEADER PREMIUM */
.header-premium{
  padding:20px;
  background:linear-gradient(135deg,#0f172a,#020617);
  border-bottom:1px solid var(--border);
}

.saudacao{
  font-size:14px;
  color:var(--text-secondary);
}

.nome{
  font-size:20px;
  font-weight:800;
}

/* RESUMO */
.resumo-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.kpi{
  padding:14px;
  border-radius:14px;
  background:var(--bg-card);
  border:1px solid var(--border);
}

.kpi strong{
  font-size:18px;
  display:block;
}

.kpi span{
  font-size:12px;
  color:var(--text-secondary);
}

/* GANHO DESTAQUE */
.kpi.total{
  grid-column:1/-1;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#000;
}

/* LISTA */
.item-corrida{
  padding:14px;
  border-radius:14px;
  background:var(--bg-card);
  border:1px solid var(--border);
  margin-bottom:10px;
}

.rota{
  font-weight:600;
}

.valor{
  font-size:18px;
  font-weight:800;
  color:var(--primary);
}

.data{
  font-size:12px;
  color:var(--text-secondary);
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header-premium">
  <div class="saudacao" id="saudacao"></div>
  <div class="nome" id="nomeMotorista"></div>
</div>

<div class="center app-container">

<!-- MENU -->
<div class="menu">
  <button class="btn-principal" onclick="ir('home.html')">📍 Tabela</button>
  <button class="btn-secundario" onclick="ir('bonus.html')">💰 Bônus</button>
  <button class="btn-secundario" onclick="ir('termos.html')">📜 Regras</button>
  <button class="btn-secundario" onclick="ir('configuracoes.html')">⚙️ Config</button>

  <button class="btn-sucesso" style="grid-column:1/-1"
  onclick="ir('grupo.html')">
  📊 Acompanhamento do Grupo
  </button>
</div>

<select id="filtro" class="select">
  <option value="geral">Geral</option>
  <option value="semana">Semana</option>
  <option value="mes">Mês</option>
</select>

<!-- RESUMO -->
<div id="resumo"></div>

<!-- GRÁFICO -->
<div class="card">
  <canvas id="grafico"></canvas>
</div>

<!-- LISTA -->
<div id="lista"></div>

<button class="btn-perigo" onclick="logout()">Sair</button>

</div>

<script>

/* 🔐 SESSÃO */
function logout(){
  localStorage.clear();
  window.location.href = "login-motorista.html";
}

(function(){
  const id = localStorage.getItem("motorista_id");
  if(!id) logout();
})();

/* USUÁRIO */
const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

function primeiroNome(n){
  return n?.split(" ")[0] || "Motorista";
}

const hora = new Date().getHours();
let saudacao = hora < 12 ? "Bom dia" :
               hora < 18 ? "Boa tarde" : "Boa noite";

document.getElementById("saudacao").innerText =
`${saudacao}`;

document.getElementById("nomeMotorista").innerText =
primeiroNome(nome);

/* NAV */
function ir(p){ window.location.href = p; }

/* DADOS */
let corridas = [];
let corridasGeral = [];
let chart = null;

async function carregar(){

  const { data: todas } = await window.supabaseClient
    .from("corridas")
    .select("*");

  corridasGeral = todas || [];

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId)
    .order("data_viagem", { ascending:false });

  corridas = data || [];

  gerar();
  gerarGrafico();
}

/* FILTRO */
function filtrar(){

  const tipo = filtro.value;
  const hoje = new Date();

  if(tipo === "geral") return corridas;

  if(tipo === "semana"){
    const inicio = new Date();
    inicio.setDate(hoje.getDate() - hoje.getDay() + 1);

    const fim = new Date(inicio);
    fim.setDate(inicio.getDate() + 6);

    return corridas.filter(c=>{
      const d = new Date(c.data_viagem);
      return d >= inicio && d <= fim;
    });
  }

  if(tipo === "mes"){
    const mesAtual = hoje.toISOString().slice(0,7);
    return corridas.filter(c=>c.data_viagem?.startsWith(mesAtual));
  }

}

/* RESUMO */
function gerar(){

  const listaFiltrada = filtrar();

  let total = 0;
  let finalizadas = 0;
  let canceladas = 0;

  listaFiltrada.forEach(c=>{
    if(c.status === "finalizada"){
      total += Number(c.valor);
      finalizadas++;
    }else{
      canceladas++;
    }
  });

  const naoAtendidas = corridasGeral.filter(c =>
    c.motorista_id !== motoristaId
  ).length;

  const media = listaFiltrada.length ? total / listaFiltrada.length : 0;

  resumo.innerHTML = `
    <div class="resumo-grid">

      <div class="kpi total">
        <span>Ganhos</span>
        <strong>R$ ${total.toFixed(2)}</strong>
      </div>

      <div class="kpi">
        <span>Corridas</span>
        <strong>${listaFiltrada.length}</strong>
      </div>

      <div class="kpi">
        <span>Média</span>
        <strong>R$ ${media.toFixed(2)}</strong>
      </div>

      <div class="kpi">
        <span>Canceladas</span>
        <strong>${canceladas}</strong>
      </div>

      <div class="kpi">
        <span>Não atendidas</span>
        <strong>${naoAtendidas}</strong>
      </div>

    </div>
  `;

  lista.innerHTML = "";

  listaFiltrada.forEach(c=>{

    let rota = `${c.origem} → ${c.destino}`;
    if(c.parada){
      rota = `${c.origem} → 🛑 ${c.parada} → ${c.destino}`;
    }

    lista.innerHTML += `
      <div class="item-corrida">
        <div class="rota">${rota}</div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>
        <div class="data">
          ${c.data_viagem || "-"} • ${c.hora_viagem || "-"}
        </div>
      </div>
    `;
  });

}

/* GRÁFICO */
function gerarGrafico(){

  let finalizadas = 0;
  let canceladas = 0;

  corridas.forEach(c=>{
    if(c.status === "finalizada") finalizadas++;
    else canceladas++;
  });

  const naoAtendidas = corridasGeral.filter(c =>
    c.motorista_id !== motoristaId
  ).length;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: ["Finalizadas", "Canceladas", "Não atendidas"],
      datasets: [{
        data: [finalizadas, canceladas, naoAtendidas]
      }]
    }
  });

}

filtro.onchange = gerar;

carregar();

</script>

</body>
</html>
