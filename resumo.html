<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>
.bloco-sec{
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.bloco-sec:last-child{
border-bottom:none;
}

.sec-title{
font-size:13px;
opacity:0.7;
margin-bottom:6px;
}

.linha{
display:flex;
justify-content:space-between;
align-items:center;
font-size:15px;
margin-bottom:6px;
position:relative;
}

.linha span:first-child{
position:relative;
padding-right:10px;
}

.linha span:first-child::after{
content:"................................................";
position:absolute;
left:100%;
white-space:nowrap;
overflow:hidden;
opacity:0.2;
}

.linha span:last-child{
font-weight:600;
color:#fff;
}

.total{
font-size:18px;
font-weight:700;
margin-top:10px;
text-align:right;
color:#FFD700;
}

  .card{
transition:0.3s;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.sec-title{
font-size:13px;
opacity:0.6;
margin-bottom:6px;
letter-spacing:0.5px;
}

.total{
font-size:20px;
font-weight:700;
margin-top:12px;
text-align:right;
color:#FFD700;
animation:pulse 1.5s infinite alternate;
}

@keyframes pulse{
from{opacity:0.7;}
to{opacity:1;}
}
</style>

</head>

<body>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>

<div class="menu-item" onclick="irPara('home.html')">🚗 Nova viagem</div>
<div class="menu-item" onclick="irPara('termos.html')">📜 Regras do grupo</div>
<div class="menu-item" onclick="irPara('configuracoes.html')">⚙️ Configurações</div>
</div>

<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="container">

<div class="card">
<h3>Resumo da viagem</h3>
<div id="rota"></div>
</div>

<div class="card">
<h3>Detalhamento da corrida</h3>
<div id="detalhe"></div>
</div>

</div>

<div class="footer">
<div class="footer-inner">

<div class="valor" id="valorFinal">R$ 0,00</div>

<div class="cta-area">
<button onclick="solicitar()">Gerar Recibo</button>
<button onclick="enviarOrcamento()">Enviar Orçamento</button>
</div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* TEMA */
(function(){
const temaSalvo = localStorage.getItem("rf_theme") || "dark";
document.body.setAttribute("data-theme", temaSalvo);
})();

/* MENU */
function abrirMenu(){
document.getElementById("menu").classList.add("ativo");
document.getElementById("menuOverlay").style.display="block";
}

function fecharMenu(){
document.getElementById("menu").classList.remove("ativo");
document.getElementById("menuOverlay").style.display="none";
}

function irPara(p){
window.location.href=p;
}

/* DADOS */
const corrida = JSON.parse(localStorage.getItem("rf_corrida_temp"));
if(!corrida) window.location.href="home.html";

let {
origem,
parada,
destino,
totalFinal,
detalhamento,
pagamento,
embarque,
desembarque,
observacao
} = corrida;

/* ROTA */
let html = `<div class="rota-item"><span>Origem:</span> ${origem}</div>`;

if(parada){
html += `<div class="rota-item"><span>Parada:</span> ${parada}</div>`;
}

html += `<div class="rota-item"><span>Destino:</span> ${destino}</div>`;

document.getElementById("rota").innerHTML = html;

/* DETALHAMENTO PREMIUM */
let detalheHTML = "";

/* EXTRAS */
if(detalhamento){
detalheHTML += `<div class="bloco-sec"><div class="sec-title">Adicionais</div>`;
detalhamento.split("\n").forEach(linha=>{
if(linha.trim()){

const partes = linha.split("R$");

const nome = partes[0].replace(":","").trim();
const valor = partes[1] ? "R$ " + partes[1].trim() : "";

detalheHTML += `
<div class="linha">
<span>${nome}</span>
<span>${valor}</span>
</div>
`;

}
});
detalheHTML += `</div>`;
}

/* PAGAMENTO */
detalheHTML += `
<div class="bloco-sec">
<div class="sec-title">Pagamento</div>
<div class="linha"><span>Forma</span><span>${pagamento || "-"}</span></div>
</div>
`;

/* HORÁRIOS (SÓ SE EXISTIR) */
  /* OBSERVAÇÃO */
if(observacao && observacao.trim() !== ""){
detalheHTML += `
<div class="bloco-sec">
<div class="sec-title">Observação</div>
<div style="font-size:14px;opacity:0.9;line-height:1.4">
${observacao}
</div>
</div>
`;
}
  
if(embarque || desembarque){
detalheHTML += `<div class="bloco-sec"><div class="sec-title">Horários</div>`;

if(embarque){
detalheHTML += `<div class="linha"><span>Embarque</span><span>${embarque}</span></div>`;
}

if(desembarque){
detalheHTML += `<div class="linha"><span>Desembarque</span><span>${desembarque}</span></div>`;
}

detalheHTML += `</div>`;
}

/* TOTAL */
detalheHTML += `<div class="total">R$ ${parseFloat(totalFinal || 0).toFixed(2)}</div>`;

document.getElementById("detalhe").innerHTML = detalheHTML;

/* VALOR FINAL */
document.getElementById("valorFinal").innerText = "R$ " + parseFloat(totalFinal || 0).toFixed(2);

/* RECIBO */
async function solicitar(){

try{

const agora = new Date();
const data = agora.toLocaleDateString("pt-BR");
const hora = agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

const total = totalFinal || 0;

const payload = {
origem,
parada,
destino,
total,
detalhes: detalhamento,
data,
hora,
embarque,
desembarque,
observacao
};

const res = await fetch("https://backend-recibo-rf.onrender.com/gerar-recibo", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(payload)
});

if(!res.ok){
throw new Error("Erro no servidor");
}

const dataRes = await res.json();

if(!dataRes.link){
throw new Error("Link não retornado");
}

const msg = `📄 Recibo da sua viagem:\n${dataRes.link}`;

window.location.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;

}catch(e){

console.error("Erro:", e);
alert("Erro ao gerar recibo. Tente novamente.");

}

}

  function enviarOrcamento(){

let texto = `🚗 *ORÇAMENTO DE VIAGEM - RF MOTORISTA*\n\n`;

texto += `📍 Origem: ${origem}\n`;
texto += `📍 Destino: ${destino}\n\n`;

texto += `💰 Valor estimado: *R$ ${parseFloat(totalFinal).toFixed(2)}*\n\n`;

if(detalhamento){
texto += `🧾 Detalhes:\n`;

detalhamento.split("\n").forEach(linha=>{
if(linha.trim()){
texto += `• ${linha}\n`;
}
});

texto += `\n`;
}

texto += `💳 Pagamento: ${pagamento || "-"}\n`;

if(observacao && observacao.trim() !== ""){
texto += `📝 Observação: ${observacao}\n`;
}    

if(embarque){
texto += `⏰ Embarque: ${embarque}\n`;
}

if(desembarque){
texto += `⏰ Desembarque: ${desembarque}\n`;
}

texto += `\n📲 Atendimento rápido e seguro`;

const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;

window.location.href = url;
}
</script>

</body>
</html>
