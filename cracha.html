<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Crachá RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
  margin:0;
  background:#000;
  font-family:system-ui;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* AREA DO CRACHÁ */
#cracha{
  width:350px;
  background:linear-gradient(180deg,#000,#111);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  border:2px solid #d4af37;
  position:relative;
}

/* LOGO */
.logo{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
}

.sub{
  text-align:center;
  color:#d4af37;
  margin-bottom:10px;
}

/* STATUS */
.status{
  text-align:center;
  margin:10px 0;
}

.status span{
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.ativo{
  background:#16a34a;
}

.inativo{
  background:#dc2626;
}

/* FOTO */
.foto{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #d4af37;
  object-fit:cover;
  display:block;
  margin:10px auto;
}

/* CARRO */
.carro{
  text-align:center;
  margin:10px 0;
}

/* NOME */
.nome{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

.tipo{
  text-align:center;
  color:#d4af37;
}

/* BOTÃO */
button{
  margin:20px;
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
}

.topo{
  text-align:center;
}

.foto-area{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.info{
  text-align:center;
  margin-top:10px;
}

.veiculo{
  font-size:14px;
  opacity:.8;
}

.placa{
  font-weight:bold;
  color:#d4af37;
}

.qr-area{
  display:flex;
  justify-content:center;
  margin-top:15px;
}  
</style>

</head>

<body>

<div id="cracha">

  <div class="topo">
    <div class="logo">RF</div>
    <div class="sub">MOTORISTA</div>

    <div class="status">
      <span id="statusBadge">ATIVO</span>
    </div>
  </div>

  <div class="foto-area">
    <img id="foto" class="foto">
  </div>

  <div class="info">

    <div class="nome" id="nome"></div>
    <div class="tipo">Motorista</div>

    <div class="veiculo" id="carro"></div>
    <div class="placa" id="placa"></div>

  </div>

  <div class="qr-area">
    <canvas id="qrcode"></canvas>
  </div>

</div>

<button onclick="baixar()">📥 Baixar Crachá</button>

<script>

/* =========================
📌 OBTER ID (URL OU STORAGE)
========================= */
function getMotoristaId(){
  try{
    const url = new URL(window.location.href);
    return url.searchParams.get("id") || localStorage.getItem("motorista_id");
  }catch{
    return localStorage.getItem("motorista_id");
  }
}

/* =========================
📌 GERAR QR CODE
========================= */
function gerarQR(id){

  const canvas = document.getElementById("qrcode");
  if(!canvas) return;

  const url = `https://rarufino27-alt.github.io/Tabela-oficial-RFDriver/cracha.html?id=${id}`;

  QRCode.toCanvas(canvas, url, {
    width: 100,
    margin: 1
  });
}

/* =========================
📌 CARREGAR DADOS
========================= */
async function carregar(){

  const id = getMotoristaId();

  if(!id){
    alert("Motorista não identificado");
    return;
  }

  try{

    const { data, error } = await window.supabaseClient
      .from("motoristas")
      .select("*")
      .eq("id", id)
      .single();

    if(error || !data){
      console.error(error);
      alert("Erro ao carregar dados");
      return;
    }

    /* =========================
    📌 ELEMENTOS
    ========================= */
    const nome = document.getElementById("nome");
    const carro = document.getElementById("carro");
    const placa = document.getElementById("placa");
    const foto = document.getElementById("foto");
    const status = document.getElementById("statusBadge");

    /* =========================
    📌 PREENCHER DADOS
    ========================= */

    if(nome) nome.innerText = data.nome || "-";

    if(carro){
      carro.innerText = `${data.marca || ""} ${data.modelo || ""}`.trim() || "-";
    }

    if(placa) placa.innerText = data.placa || "-";

    /* =========================
    📌 FOTO (CORRIGIDO)
    ========================= */

    if(foto){
      foto.src = data.foto_url || "icons/user.png";

      foto.onerror = () => {
        foto.src = "icons/user.png";
      };
    }

    /* =========================
    📌 STATUS
    ========================= */

    if(status){
      if(data.status === "ativo"){
        status.innerText = "ATIVO";
        status.className = "ativo";
      }else{
        status.innerText = "INATIVO";
        status.className = "inativo";
      }
    }

    /* =========================
    📌 GERAR QR
    ========================= */
    gerarQR(data.id);

  }catch(e){
    console.error(e);
    alert("Erro inesperado");
  }
}

/* =========================
📌 DOWNLOAD DO CRACHÁ
========================= */
async function baixar(){

  const elemento = document.getElementById("cracha");

  if(!elemento){
    alert("Erro ao gerar crachá");
    return;
  }

  try{

    const canvas = await html2canvas(elemento, {
      scale: 2,
      useCORS: true
    });

    const link = document.createElement("a");
    link.download = "cracha-rf.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

  }catch(e){
    console.error(e);
    alert("Erro ao baixar crachá");
  }
}

/* =========================
📌 START SEGURO
========================= */
document.addEventListener("DOMContentLoaded", carregar);

</script>

</body>
</html>
