<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

</head>

<body>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>
<div class="menu-item" onclick="irPara('home.html')">🚗 Nova viagem</div>
<div class="menu-item" onclick="irPara('configuracoes.html')">⚙️ Configurações</div>
</div>

<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="container">

<!-- ROTA -->
<div class="card" id="rota"></div>

<!-- EXTRAS -->
<div class="card">
<h3>Detalhes da viagem</h3>
<div id="extras"></div>
</div>

<!-- VALORES -->
<div class="card">
<h3>Resumo de valores</h3>
<div id="valores"></div>
</div>

<!-- PAGAMENTO -->
<div class="card">
<h3>Forma de pagamento</h3>
<select id="pagamento" class="select">
<option value="dinheiro">Dinheiro</option>
<option value="pix">Pix</option>
<option value="debito">Débito</option>
<option value="credito">Crédito</option>
</select>
</div>

</div>

<div class="footer">
<div class="footer-inner">
<div class="valor" id="totalFinal">R$ 0,00</div>

<div class="cta-area-duplo">
<button class="btn-secundario" onclick="enviarOrcamento()">📤 Orçamento</button>
<button class="btn-principal" onclick="solicitar()">📄 Recibo</button>
</div>

</div>
</div>

<script>

/* =========================
TEMA (CORRIGIDO)
========================= */
(function(){
const tema = localStorage.getItem("rf_theme") || "dark";
document.body.setAttribute("data-theme", tema);
})();

/* =========================
MENU
========================= */
function abrirMenu(){
menu.classList.add("ativo");
menuOverlay.style.display="block";
}

function fecharMenu(){
menu.classList.remove("ativo");
menuOverlay.style.display="none";
}

function irPara(p){
window.location.href=p;
}

/* =========================
DADOS (ESPELHO)
========================= */
const dados = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!dados){
alert("Erro ao carregar dados");
window.location.href="home.html";
}

let {
origem,
parada,
destino,
valor,
categoria,
feira,
animal,
espera,
saidaPraia,
obs,
embarque,
desembarque
} = dados;

/* =========================
ROTA
========================= */
function renderRota(){

let html = `
<div class="rota-top">
<div class="ponto origem"></div>
<div>${origem}</div>
</div>
`;

if(parada){
html += `
<div class="rota-top">
<div class="ponto parada"></div>
<div>${parada}</div>
</div>
`;
}

html += `
<div class="rota-top">
<div class="ponto destino"></div>
<div>${destino}</div>
</div>
`;

document.getElementById("rota").innerHTML = html;
}

/* =========================
EXTRAS
========================= */
function renderExtras(){

let html = "";

if(obs){
html += `<div class="linha"><span>Obs</span><span>${obs}</span></div>`;
}

if(embarque){
html += `<div class="linha"><span>Embarque</span><span>${embarque}</span></div>`;
}

if(desembarque){
html += `<div class="linha"><span>Desembarque</span><span>${desembarque}</span></div>`;
}

document.getElementById("extras").innerHTML = html;
}

/* =========================
VALORES (ESPELHO)
========================= */
function renderValores(){

let base = parseFloat(valor) || 0;
let taxas = 0;
let html = "";

/* BASE */
html += `<div class="linha"><span>Corrida</span><span>R$ ${base.toFixed(2)}</span></div>`;

/* TAXAS */

if(feira > 0){
html += `<div class="linha"><span>Tx Feira</span><span>R$ ${parseFloat(feira).toFixed(2)}</span></div>`;
taxas += parseFloat(feira);
}

if(animal > 0){
html += `<div class="linha"><span>Animal</span><span>R$ ${parseFloat(animal).toFixed(2)}</span></div>`;
taxas += parseFloat(animal);
}

if(saidaPraia > 0){
html += `<div class="linha"><span>Praia</span><span>R$ ${parseFloat(saidaPraia).toFixed(2)}</span></div>`;
taxas += parseFloat(saidaPraia);
}

if(espera > 5){
const t = 3 + ((espera-5)*0.6);
html += `<div class="linha"><span>Espera</span><span>R$ ${t.toFixed(2)}</span></div>`;
taxas += t;
}

/* SUBTOTAL */
let subtotal = base + taxas;

/* VEÍCULO */
if(categoria > 1){
const add = subtotal * (categoria - 1);
html += `<div class="linha"><span>Veículo 6 lugares</span><span>R$ ${add.toFixed(2)}</span></div>`;
subtotal *= categoria;
}

/* PAGAMENTO */
let pagamento = document.getElementById("pagamento").value;
let total = subtotal;

if(pagamento === "credito") total = subtotal / 0.95;
if(pagamento === "debito") total = subtotal / 0.98;

/* FINAL */
html += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;

document.getElementById("valores").innerHTML = html;
document.getElementById("totalFinal").innerText = "R$ " + total.toFixed(2);

localStorage.setItem("rf_total_final", total.toFixed(2));
}

/* EVENTO */
document.getElementById("pagamento").addEventListener("change", renderValores);

/* INIT */
renderRota();
renderExtras();
renderValores();

</script>

</body>
</html>
