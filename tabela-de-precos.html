<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Viagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* 🔥 VISUAL CORPORATIVO */
body{
  background:#0f172a;
  color:#e5e7eb;
}

/* HEADER */
.top-white{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:#1e293b;
  border-bottom:1px solid #334155;
}

.logo-area{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-img{
  width:38px;
}

.logo-text-dark{
  font-weight:700;
  font-size:14px;
}

/* CARD */
.card-modern{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

/* INPUT */
.input-box{
  padding:14px;
  border-radius:10px;
  margin-bottom:8px;
  background:#020617;
  border:1px solid #334155;
}

.input-box.green{ border-left:4px solid #22c55e; }
.input-box.yellow{ border-left:4px solid #facc15; }
.input-box.red{ border-left:4px solid #ef4444; }

/* VALOR */
#previewTotal{
  font-size:32px;
  font-weight:bold;
  color:#22c55e;
}

/* PAGAMENTO */
.pagamento-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.pagamento-item{
  background:#020617;
  border:1px solid #334155;
  border-radius:12px;
  padding:14px;
  text-align:center;
  cursor:pointer;
}

.pagamento-item.ativo{
  border:2px solid #3b82f6;
}

/* CTA */
.cta-box{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#020617;
  border-top:1px solid #334155;
}

.cta-box button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:bold;
  font-size:16px;
}

.add-parada{
  font-size:13px;
  color:#facc15;
  margin:6px 0;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="app-container">

<!-- ROTA -->
<div class="card-modern">

  <div class="input-box green" id="origemBtn">
    <div id="origemTexto">Selecionar origem</div>
  </div>

  <div class="add-parada" id="addParada">+ Adicionar parada</div>

  <div class="input-box yellow" id="paradaBtn" style="display:none">
    <div id="paradaTexto">Selecionar parada</div>
  </div>

  <div class="input-box red" id="destinoBtn">
    <div id="destinoTexto">Selecionar destino</div>
  </div>

</div>

<!-- VEÍCULO -->
<div class="card-modern">

  <div class="veiculos">
    <div class="veiculo ativo" data-value="1">🚗 4 lugares</div>
    <div class="veiculo" data-value="1.5">🚐 6 lugares</div>
  </div>

  <input type="hidden" id="tipoCarro" value="1">

</div>

<!-- VALOR -->
<div class="card-modern" style="text-align:center">
  <span style="opacity:.7">Valor estimado</span>
  <h1 id="previewTotal">R$ 0,00</h1>
</div>

<!-- PAGAMENTO -->
<div class="card-modern">
  <h3>Pagamento</h3>

  <div class="pagamento-grid">
    <div class="pagamento-item ativo" data="dinheiro">💵 Dinheiro</div>
    <div class="pagamento-item" data="pix">⚡ PIX</div>
    <div class="pagamento-item" data="credito">💳 Crédito</div>
    <div class="pagamento-item" data="debito">🏧 Débito</div>
  </div>
</div>

<!-- ADICIONAIS -->
<div class="card-modern">

  <select id="feira">
    <option value="0">Feira</option>
    <option value="4.99">1 carrinho</option>
    <option value="7.99">2 carrinhos</option>
  </select>

  <select id="animal">
    <option value="0">Animal</option>
    <option value="4.99">Pequeno</option>
    <option value="7.99">Médio</option>
    <option value="11.99">Grande</option>
  </select>

  <input type="number" id="espera" placeholder="Tempo espera">

  <select id="saidaPraia">
    <option value="0">Saída praia</option>
    <option value="9.99">Sim</option>
  </select>

</div>

<!-- HORÁRIO -->
<div class="card-modern">
  <h3>Horário</h3>
  <input type="time" id="embarque">
</div>

</div>

<!-- BOTÃO -->
<div class="cta-box">
  <button id="btnContinuar">Enviar Orçamento</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="busca">
    <div class="lista" id="lista"></div>
  </div>
</div>

<script>

/* LOGIN */
if(!localStorage.getItem("motorista_id")){
  window.location.href = "login-motorista.html";
}

/* ELEMENTOS */
const origemBtn = document.getElementById("origemBtn");
const destinoBtn = document.getElementById("destinoBtn");
const paradaBtn = document.getElementById("paradaBtn");
const addParada = document.getElementById("addParada");

const origemTexto = document.getElementById("origemTexto");
const destinoTexto = document.getElementById("destinoTexto");
const paradaTexto = document.getElementById("paradaTexto");

const lista = document.getElementById("lista");
const busca = document.getElementById("busca");
const modal = document.getElementById("modal");

const previewTotal = document.getElementById("previewTotal");

const feira = document.getElementById("feira");
const animal = document.getElementById("animal");
const espera = document.getElementById("espera");
const saidaPraia = document.getElementById("saidaPraia");
const embarque = document.getElementById("embarque");
const tipoCarro = document.getElementById("tipoCarro");

/* ESTADO */
let origem=null;
let destino=null;
let parada=null;
let modo=null;
let pagamento="dinheiro";
let listaAtual=[];

/* INIT */
(async()=>{
  await DataManager.carregar();
})();

/* MODAL */
function abrirModal(tipo){

  modo = tipo;
  busca.value = "";

  let dados = [];

  if(tipo==="origem") dados = DataManager.listarOrigens();

  if(tipo==="parada"){
    if(!origem) return alert("Selecione origem");
    dados = DataManager.listarDestinos(origem);
  }

  if(tipo==="destino"){
    if(!origem) return alert("Selecione origem");
    dados = parada
      ? DataManager.listarDestinos(parada)
      : DataManager.listarDestinos(origem);
  }

  listaAtual = dados;
  renderLista(dados);
  modal.style.display="flex";
}

function renderLista(arr){
  lista.innerHTML="";
  arr.forEach(item=>{
    const div=document.createElement("div");
    div.innerText=item;
    div.onclick=()=>{
      selecionar(item);
      modal.style.display="none";
    };
    lista.appendChild(div);
  });
}

/* BUSCA */
busca.addEventListener("input",()=>{
  const termo = busca.value.toLowerCase();
  renderLista(listaAtual.filter(i=>i.toLowerCase().includes(termo)));
});

/* SELEÇÃO */
function selecionar(valor){

  if(modo==="origem"){
    origem=valor;
    parada=null;
    destino=null;
    origemTexto.innerText=valor;
    destinoTexto.innerText="Selecionar destino";
    paradaBtn.style.display="none";
  }

  if(modo==="parada"){
    parada=valor;
    destino=null;
    paradaTexto.innerText=valor;
  }

  if(modo==="destino"){
    destino=valor;
    destinoTexto.innerText=valor;
  }

  calcular();
}

/* EVENTOS */
origemBtn.onclick=()=>abrirModal("origem");
destinoBtn.onclick=()=>abrirModal("destino");
paradaBtn.onclick=()=>abrirModal("parada");

addParada.onclick=()=>{
  if(!origem) return alert("Selecione origem");
  paradaBtn.style.display="flex";
};

document.querySelectorAll(".veiculo").forEach(v=>{
  v.onclick=()=>{
    document.querySelectorAll(".veiculo").forEach(x=>x.classList.remove("ativo"));
    v.classList.add("ativo");
    tipoCarro.value=v.dataset.value;
    calcular();
  };
});

document.querySelectorAll(".pagamento-item").forEach(p=>{
  p.onclick=()=>{
    document.querySelectorAll(".pagamento-item").forEach(x=>x.classList.remove("ativo"));
    p.classList.add("ativo");
    pagamento=p.getAttribute("data");
    calcular();
  };
});

/* AUTO UPDATE */
["feira","animal","espera","saidaPraia","embarque"].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener("change",calcular);
  el.addEventListener("input",calcular);
});

/* 🔥 CÁLCULO FINAL */
function calcular(){

  if(!origem || !destino){
    previewTotal.innerText="R$ 0,00";
    return;
  }

  let base = !parada
    ? DataManager.buscarValor(origem,destino)||0
    : (DataManager.buscarValor(origem,parada)||0) +
      (DataManager.buscarValor(parada,destino)||0);

  let taxas =
    Number(feira.value||0)+
    Number(animal.value||0)+
    Number(saidaPraia.value||0);

  const esperaVal = Number(espera.value||0);

  if(esperaVal>5){
    taxas += 3 + ((esperaVal-5)*0.6);
  }

  /* 🌙 NOTURNO (22:30 → 05:00) */
  if(embarque.value){
    const [h,m]=embarque.value.split(":").map(Number);
    const min = h*60 + m;

    if(min >= 1350 || min < 300){
      taxas += base <= 24.99 ? 5 : base * 0.35;
    }
  }

  let total=(base+taxas)*Number(tipoCarro.value||1);

  if(pagamento==="credito") total/=0.95;
  if(pagamento==="debito") total/=0.98;

  previewTotal.innerText="R$ "+total.toFixed(2);
}

/* =========================
📲 ENVIAR WHATSAPP
========================= */

document.getElementById("btnContinuar").onclick = ()=>{

  if(!origem || !destino){
    return alert("Selecione origem e destino");
  }

  let base = !parada
    ? DataManager.buscarValor(origem,destino)||0
    : (DataManager.buscarValor(origem,parada)||0) +
      (DataManager.buscarValor(parada,destino)||0);

  let taxas = 0;
  let detalhes = "";

  const feiraVal = Number(feira.value||0);
  const animalVal = Number(animal.value||0);
  const praiaVal = Number(saidaPraia.value||0);
  const esperaVal = Number(espera.value||0);

  if(feiraVal>0){
    taxas+=feiraVal;
    detalhes+=`🛒 Feira: R$ ${feiraVal.toFixed(2)}\n`;
  }

  if(animalVal>0){
    taxas+=animalVal;
    detalhes+=`🐶 Animal: R$ ${animalVal.toFixed(2)}\n`;
  }

  if(praiaVal>0){
    taxas+=praiaVal;
    detalhes+=`⛱️ Praia: R$ ${praiaVal.toFixed(2)}\n`;
  }

  if(esperaVal>5){
    const esperaCalc = 3 + ((esperaVal-5)*0.6);
    taxas+=esperaCalc;
    detalhes+=`⏱️ Espera: R$ ${esperaCalc.toFixed(2)}\n`;
  }

  /* 🌙 NOTURNO */
  if(embarque.value){
    const [h,m]=embarque.value.split(":").map(Number);
    const min=h*60+m;

    if(min>=1350 || min<300){
      const adicional = base <= 24.99 ? 5 : base*0.35;
      taxas+=adicional;
      detalhes+=`🌙 Noturno: R$ ${adicional.toFixed(2)}\n`;
    }
  }

  let total = (base + taxas) * Number(tipoCarro.value||1);

  if(pagamento==="credito") total/=0.95;
  if(pagamento==="debito") total/=0.98;

  /* =========================
  MENSAGEM
  ========================= */

  let msg = `🚖 *RF - Orçamento de Viagem*\n\n`;

  msg += `📍 Origem:\n${origem}\n\n`;

  if(parada){
    msg += `🛑 Parada:\n${parada}\n\n`;
  }

  msg += `🏁 Destino:\n${destino}\n\n`;

  msg += `💰 Subtotal: R$ ${base.toFixed(2)}\n\n`;

  msg += `──────────────\n`;
  msg += `📋 *Detalhes*\n`;

  msg += detalhes || "Sem adicionais\n";

  msg += `\n💸 Taxas: R$ ${taxas.toFixed(2)}\n`;

  msg += `──────────────\n`;
  msg += `💳 Pagamento: ${pagamento.toUpperCase()}\n\n`;

  msg += `💰 *Total: R$ ${total.toFixed(2)}*`;

  /* ABRIR WHATSAPP */
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
};
</script>

</body>
</html>
