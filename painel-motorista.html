<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* TABS */
.tabs{
  display:flex;
  gap:6px;
  margin-bottom:12px;
}

.tab{
  flex:1;
  padding:12px;
  text-align:center;
  border-radius:10px;
  background:var(--bg-card);
  border:1px solid var(--border);
  cursor:pointer;
}

.tab.ativo{
  background:var(--primary);
  color:#000;
}

/* CONTEÚDO */
.aba{
  display:none;
}

.aba.ativa{
  display:block;
}

/* KPI */
.kpi{
  padding:14px;
  border-radius:14px;
  background:var(--bg-card);
  border:1px solid var(--border);
  margin-bottom:10px;
}

.kpi strong{
  font-size:20px;
  display:block;
}

.small{
  font-size:12px;
  color:var(--text-secondary);
}

</style>

</head>

<body>

<div class="top-white">
  <div class="logo-area">
    <span class="logo-text-dark">Painel RF</span>
  </div>
</div>

<div class="center app-container">

<!-- TABS -->
<div class="tabs">
  <div class="tab ativo" onclick="trocarAba(0)">📊 Painel</div>
  <div class="tab" onclick="trocarAba(1)">👤 Perfil</div>
  <div class="tab" onclick="trocarAba(2)">🌐 Grupo</div>
</div>

<!-- =========================
ABA 1 - PAINEL MOTORISTA
========================= -->
<div class="aba ativa" id="aba0">

<div id="painelMotorista"></div>

</div>

<!-- =========================
ABA 2 - PERFIL
========================= -->
<div class="aba" id="aba1">

<div class="card">
  <strong id="nomePerfil"></strong>
  <div class="small" id="telefonePerfil"></div>
</div>

</div>

<!-- =========================
ABA 3 - GRUPO
========================= -->
<div class="aba" id="aba2">

<div id="painelGrupo"></div>

</div>

</div>

<script>

/* LOGIN */
const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

if(!motoristaId){
  window.location.href = "login-motorista.html";
}

/* TABS */
function trocarAba(i){
  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("ativo", idx===i);
  });

  document.querySelectorAll(".aba").forEach((a,idx)=>{
    a.classList.toggle("ativa", idx===i);
  });
}

/* =========================
CARREGAR DADOS
========================= */

async function carregar(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*");

  if(!data) return;

  // 🔥 INDIVIDUAL
  const minhas = data.filter(c=>c.motorista_id == motoristaId);

  let total = 0;
  let finalizadas = 0;

  minhas.forEach(c=>{
    if(c.status === "finalizada"){
      total += Number(c.valor);
      finalizadas++;
    }
  });

  painelMotorista.innerHTML = `
    <div class="kpi">
      <span>Ganhos</span>
      <strong>R$ ${total.toFixed(2)}</strong>
    </div>

    <div class="kpi">
      <span>Corridas</span>
      <strong>${minhas.length}</strong>
    </div>

    <div class="kpi">
      <span>Finalizadas</span>
      <strong>${finalizadas}</strong>
    </div>
  `;

  /* =========================
  PERFIL
  ========================= */
  nomePerfil.innerText = nome;

  /* =========================
  GRUPO
  ========================= */

  let totalGrupo = data.length;
  let totalValor = 0;

  let finalizadasG = 0;
  let canceladasG = 0;

  data.forEach(c=>{
    if(c.status === "finalizada"){
      totalValor += Number(c.valor);
      finalizadasG++;
    }else{
      canceladasG++;
    }
  });

  const naoAtendidas = totalGrupo - (finalizadasG + canceladasG);

  const perdido = data
    .filter(c=>c.status !== "finalizada")
    .reduce((s,c)=>s+Number(c.valor||0),0);

  painelGrupo.innerHTML = `
    <div class="kpi">
      <span>Total de corridas</span>
      <strong>${totalGrupo}</strong>
    </div>

    <div class="kpi">
      <span>Dinheiro gerado</span>
      <strong>R$ ${totalValor.toFixed(2)}</strong>
    </div>

    <div class="kpi">
      <span>Dinheiro perdido</span>
      <strong>R$ ${perdido.toFixed(2)}</strong>
    </div>

    <div class="kpi">
      <span>Finalizadas</span>
      <strong>${((finalizadasG/totalGrupo)*100).toFixed(0)}%</strong>
    </div>

    <div class="kpi">
      <span>Canceladas</span>
      <strong>${((canceladasG/totalGrupo)*100).toFixed(0)}%</strong>
    </div>

    <div class="kpi">
      <span>Não atendidas</span>
      <strong>${((naoAtendidas/totalGrupo)*100).toFixed(0)}%</strong>
    </div>
  `;

}

carregar();

</script>

</body>
</html>
