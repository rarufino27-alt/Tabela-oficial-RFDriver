<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

</head>

<body>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>
<div class="menu-item" onclick="irPara('home.html')">🚗 Nova viagem</div>
<div class="menu-item" onclick="irPara('configuracoes.html')">⚙️ Configurações</div>
</div>

<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="container">

<!-- ROTA -->
<div class="card destaque-card" id="rota"></div>

<!-- EXTRAS -->
<div class="card">
<h3>Detalhes da viagem</h3>
<div id="extras"></div>
</div>

<!-- DETALHAMENTO -->
<div class="card">
<h3>Resumo de valores</h3>
<div id="detalhe"></div>
</div>

<!-- PAGAMENTO -->
<div class="card">
<h3>Forma de pagamento</h3>
<select id="pagamento" class="select">
<option value="dinheiro">Dinheiro</option>
<option value="pix">Pix</option>
<option value="debito">Débito</option>
<option value="credito">Crédito</option>
</select>
</div>

</div>
  
<div class="footer">
<div class="footer-inner">

<div class="valor" id="valorFinal">R$ 0,00</div>

<div class="cta-area-duplo">
<button class="btn-secundario" onclick="wpp()">📤 Orçamento WhatsApp</button>
<button class="btn-principal" onclick="pdf()">📄 Gerar PDF</button>
</div>

</div>
</div>

<script>

/* =========================
TEMA
========================= */
(function(){
const tema = localStorage.getItem("rf_theme") || "dark";
document.body.setAttribute("data-theme", tema);
})();

/* MENU */
function abrirMenu(){
menu.classList.add("ativo");
menuOverlay.style.display="block";
}
function fecharMenu(){
menu.classList.remove("ativo");
menuOverlay.style.display="none";
}
function irPara(p){
window.location.href=p;
}

/* =========================
DADOS
========================= */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));
if(!d) window.location.href="home.html";

/* =========================
ROTA
========================= */
function montarRota(){

let html = `<div class="rota-top"><div class="ponto origem"></div><div>${d.origem}</div></div>`;

if(d.parada){
html += `<div class="rota-top"><div class="ponto parada"></div><div>${d.parada}</div></div>`;
}

html += `<div class="rota-top"><div class="ponto destino"></div><div>${d.destino}</div></div>`;

document.getElementById("rota").innerHTML = html;
}

/* =========================
EXTRAS
========================= */
function montarExtras(){

let html = "";

if(d.obs){
html += `<div class="linha"><span>Observação</span><span>${d.obs}</span></div>`;
}

if(d.embarque){
html += `<div class="linha"><span>Embarque</span><span>${d.embarque}</span></div>`;
}

if(d.desembarque){
html += `<div class="linha"><span>Desembarque</span><span>${d.desembarque}</span></div>`;
}

document.getElementById("extras").innerHTML = html;
}

/* =========================
NOTURNO
========================= */
function adicionalNoturno(base){

if(!d.embarque) return 0;

const [h,m] = d.embarque.split(":").map(Number);
const hora = h + (m/60);

if(hora >= 22.5 || hora <= 5){
if(base <= 24.99) return 4.99;
return base * 0.35;
}

return 0;
}

/* =========================
CÁLCULO
========================= */
function calcular(){

let base = parseFloat(d.valor) || 0;
let taxas = 0;
let html = "";

/* BASE */
html += `<div class="linha"><span>Corrida</span><span>R$ ${base.toFixed(2)}</span></div>`;

/* NOTURNO */
const noturno = adicionalNoturno(base);
if(noturno > 0){
taxas += noturno;
html += `<div class="linha"><span>Adicional Noturno</span><span>R$ ${noturno.toFixed(2)}</span></div>`;
}

/* TAXAS */
if(d.feira > 0){
taxas += +d.feira;
html += `<div class="linha"><span>Feira</span><span>R$ ${(+d.feira).toFixed(2)}</span></div>`;
}

if(d.animal > 0){
taxas += +d.animal;
html += `<div class="linha"><span>Animal</span><span>R$ ${(+d.animal).toFixed(2)}</span></div>`;
}

if(d.saidaPraia > 0){
taxas += +d.saidaPraia;
html += `<div class="linha"><span>Saída Praia</span><span>R$ ${(+d.saidaPraia).toFixed(2)}</span></div>`;
}

if(d.espera > 5){
const t = 3 + ((d.espera-5)*0.6);
taxas += t;
html += `<div class="linha"><span>Espera</span><span>R$ ${t.toFixed(2)}</span></div>`;
}

/* SUBTOTAL */
let subtotal = base + taxas;

/* VEÍCULO */
if(d.categoria > 1){
const add = subtotal * (d.categoria - 1);
html += `<div class="linha"><span>6 lugares</span><span>R$ ${add.toFixed(2)}</span></div>`;
subtotal *= d.categoria;
}

/* PAGAMENTO */
let pagamento = document.getElementById("pagamento").value;
let total = subtotal;

if(pagamento === "credito") total = subtotal / 0.95;
if(pagamento === "debito") total = subtotal / 0.98;

html += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;

document.getElementById("detalhe").innerHTML = html;
document.getElementById("valorFinal").innerText = "R$ " + total.toFixed(2);

localStorage.setItem("rf_total_final", total.toFixed(2));
}

document.getElementById("pagamento").addEventListener("change", calcular);

/* =========================
WHATSAPP
========================= */
function wpp(){

let total = localStorage.getItem("rf_total_final");

let msg = `🚗 *ORÇAMENTO RF*\n\n`;
msg += `📍 ${d.origem}\n`;
if(d.parada) msg += `⏳ ${d.parada}\n`;
msg += `🏁 ${d.destino}\n\n`;

msg += `🚘 ${d.categoria > 1 ? "6 lugares" : "4 lugares"}\n`;

if(d.embarque) msg += `🕒 ${d.embarque}\n`;
if(d.desembarque) msg += `🕓 ${d.desembarque}\n`;
if(d.obs) msg += `📝 ${d.obs}\n`;

msg += `\n💰 *Total: R$ ${parseFloat(total).toFixed(2)}*`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* =========================
PDF
========================= */
async function pdf(){

try{

let total = localStorage.getItem("rf_total_final");

const payload = {
origem:d.origem,
parada:d.parada,
destino:d.destino,
total,
detalhes:"Resumo da viagem",
data:new Date().toLocaleDateString(),
hora:new Date().toLocaleTimeString(),
embarque:d.embarque,
desembarque:d.desembarque
};

const res = await fetch("https://backend-recibo-rf.onrender.com/gerar-recibo",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const r = await res.json();

window.location.href=`https://wa.me/?text=${encodeURIComponent("📄 Recibo:\n"+r.link)}`;

}catch(e){
alert("Erro ao gerar PDF");
}

}

/* INIT */
montarRota();
montarExtras();
calcular();

</script>

</body>
</html>
