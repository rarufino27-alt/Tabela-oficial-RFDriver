<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:#fff;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* CARD */
.card{
background:#161616;
border-radius:16px;
padding:16px;
border:1px solid rgba(255,255,255,.05);
}

/* ROTA */
.rota{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.rota-box{
flex:1;
}

.label{
font-size:12px;
opacity:.6;
}

.nome{
font-weight:bold;
}

/* TITULOS */
h3{
margin:0 0 10px;
}

/* TAXAS */
.linha{
display:flex;
justify-content:space-between;
margin:6px 0;
}

/* PAGAMENTO */
.pagamentos{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.pagamento{
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,.1);
text-align:center;
cursor:pointer;
}

.pagamento.ativo{
border:1px solid #facc15;
color:#facc15;
}

/* TOTAL */
.total-box{
display:flex;
justify-content:space-between;
align-items:center;
}

.total{
font-size:26px;
font-weight:bold;
color:#facc15;
}

/* BOTÕES */
.botoes{
display:flex;
gap:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn-wpp{
background:#16a34a;
color:#fff;
}

.btn-pdf{
background:#facc15;
color:#000;
}

</style>
</head>

<body>

<div class="container">

<!-- ROTA -->
<div class="card rota">
<div class="rota-box">
<div class="label">Origem</div>
<div class="nome" id="origem"></div>
</div>

<div>→</div>

<div class="rota-box">
<div class="label">Destino</div>
<div class="nome" id="destino"></div>
</div>
</div>

<!-- DETALHES -->
<div class="card">
<h3>Resumo da viagem</h3>
<div id="detalhes"></div>
</div>

<!-- TAXAS -->
<div class="card">
<h3>Taxas adicionais</h3>
<div id="taxas"></div>
</div>

<!-- PAGAMENTO -->
<div class="card">
<h3>Forma de pagamento</h3>

<div class="pagamentos">
<div class="pagamento ativo" data="dinheiro">Dinheiro</div>
<div class="pagamento" data="pix">PIX</div>
<div class="pagamento" data="credito">Crédito</div>
<div class="pagamento" data="debito">Débito</div>
</div>

</div>

<!-- TOTAL -->
<div class="card">
<div class="total-box">
<div>
<div class="label">Total da viagem</div>
<div class="total" id="total">R$ 0,00</div>
</div>

<div id="resumoValores"></div>
</div>
</div>

<!-- BOTÕES -->
<div class="botoes">
<button class="btn-wpp" onclick="wpp()">WhatsApp</button>
<button class="btn-pdf" onclick="pdf()">Gerar PDF</button>
</div>

</div>

<script>

/* DADOS */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!d){
alert("Erro: dados não encontrados");
location.href="home.html";
}

/* ROTA */
document.getElementById("origem").innerText = d.origem;
document.getElementById("destino").innerText = d.destino;

/* DETALHES */
document.getElementById("detalhes").innerHTML = `
Veículo: ${d.categoria>1?"6 lugares":"4 lugares"}<br>
Embarque: ${d.embarque || "-"}<br>
Obs: ${d.obs || "-"}
`;

/* TAXAS */
let base = parseFloat(d.valor) || 0;
let taxas = 0;

function add(nome,val){
if(val>0){
taxas += val;
return `<div class="linha"><span>${nome}</span><span>R$ ${val.toFixed(2)}</span></div>`;
}
return "";
}

let taxasHTML = "";

taxasHTML += add("Feira", +d.feira || 0);
taxasHTML += add("Animal", +d.animal || 0);
taxasHTML += add("Saída Praia", +d.saidaPraia || 0);

/* ESPERA */
if(d.espera>5){
let t = 3 + ((d.espera-5)*0.6);
taxasHTML += add("Espera", t);
}

/* NOTURNO */
if(d.embarque){
let [h,m] = d.embarque.split(":");
let hora = +h + (m/60);

if(hora>=22.5 || hora<=5){
let n = base<=24.99 ? 4.99 : base*0.35;
taxasHTML += add("Noturno", n);
}
}

document.getElementById("taxas").innerHTML = taxasHTML;

/* PAGAMENTO */
let tipo = "dinheiro";

document.querySelectorAll(".pagamento").forEach(p=>{
p.onclick = ()=>{
document.querySelectorAll(".pagamento").forEach(x=>x.classList.remove("ativo"));
p.classList.add("ativo");
tipo = p.getAttribute("data");
calcular();
};
});

/* CALCULO */
function calcular(){

let total = base + taxas;

if(tipo==="credito") total/=0.95;
if(tipo==="debito") total/=0.98;

document.getElementById("total").innerText = "R$ " + total.toFixed(2);

document.getElementById("resumoValores").innerHTML = `
<div>Base: R$ ${base.toFixed(2)}</div>
<div>Taxas: R$ ${taxas.toFixed(2)}</div>
`;

localStorage.setItem("rf_total_final", total.toFixed(2));
}

calcular();

/* WHATSAPP */
function wpp(){

let total = localStorage.getItem("rf_total_final");

let msg = `🚗 *Resumo da viagem RF*

📍 ${d.origem} → ${d.destino}

💰 Total: R$ ${total}`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* PDF */
async function pdf(){

let total = localStorage.getItem("rf_total_final");

const res = await fetch("https://backend-recibo-rf.onrender.com/gerar-recibo",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
origem:d.origem,
destino:d.destino,
total
})
});

const r = await res.json();

window.open(r.link);
}

</script>

</body>
</html>
