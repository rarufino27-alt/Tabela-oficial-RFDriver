<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

</head>

<body>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>
<div class="menu-item" onclick="irPara('home.html')">🚗 Nova viagem</div>
<div class="menu-item" onclick="irPara('termos.html')">📜 Regras do grupo</div>
<div class="menu-item" onclick="irPara('configuracoes.html')">⚙️ Configurações</div>
</div>

<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="container">

  <!-- ROTA -->
  <div class="card destaque-card" id="rota"></div>

  <!-- EXTRAS -->
  <div class="card">
    <h3>Informações da viagem</h3>
    <div id="extras"></div>
  </div>

  <!-- DETALHAMENTO -->
  <div class="card">
    <h3>Resumo de valores</h3>
    <div id="detalhe"></div>
  </div>

  <!-- PAGAMENTO -->
  <div class="card">
    <h3>Forma de pagamento</h3>
    <select id="pagamento" class="select">
      <option value="dinheiro">Dinheiro</option>
      <option value="pix">Pix</option>
      <option value="debito">Débito</option>
      <option value="credito">Crédito</option>
    </select>
  </div>

</div>
  
<div class="footer">
<div class="footer-inner">
<div class="valor" id="valorFinal">R$ 0,00</div>

<div class="cta-area-duplo">
<button class="btn-secundario" onclick="enviarOrcamento()">📤 Orçamento</button>
<button class="btn-principal" onclick="solicitar()">📄 Recibo</button>
</div>

</div>
</div>

<script>

/* =========================
TEMA
========================= */
(function(){
const temaSalvo = localStorage.getItem("rf_theme") || "dark";
document.body.setAttribute("data-theme", temaSalvo);
})();

/* =========================
MENU
========================= */
function abrirMenu(){
menu.classList.add("ativo");
menuOverlay.style.display="block";
}

function fecharMenu(){
menu.classList.remove("ativo");
menuOverlay.style.display="none";
}

function irPara(p){
window.location.href=p;
}

/* =========================
DADOS
========================= */
const corrida = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!corrida){
alert("Erro ao carregar corrida");
window.location.href="home.html";
}

let {
origem,
parada,
destino,
valor,
categoria = 1,
feira = 0,
animal = 0,
espera = 0,
saidaPraia = 0,
obs = "",
embarque = "",
desembarque = ""
} = corrida;

/* =========================
ROTA
========================= */
function montarRota(){

let html = `
<div class="rota-top">
  <div class="ponto origem"></div>
  <div class="rota-texto">${origem}</div>
</div>
`;

if(parada){
html += `
<div class="rota-top parada">
  <div class="ponto parada"></div>
  <div class="rota-texto">${parada}</div>
</div>
`;
}

html += `
<div class="rota-top">
  <div class="ponto destino"></div>
  <div class="rota-texto">${destino}</div>
</div>
`;

document.getElementById("rota").innerHTML = html;
}

/* =========================
EXTRAS (OBS + HORÁRIO)
========================= */
function montarExtras(){

let html = "";

if(obs){
html += `<div class="linha"><span>Observação</span><span>${obs}</span></div>`;
}

if(embarque){
html += `<div class="linha"><span>Embarque</span><span>${embarque}</span></div>`;
}

if(desembarque){
html += `<div class="linha"><span>Desembarque</span><span>${desembarque}</span></div>`;
}

document.getElementById("extras").innerHTML = html;
}

/* =========================
ADICIONAL NOTURNO
========================= */
function adicionalNoturno(base){

if(!embarque) return 0;

const [h,m] = embarque.split(":").map(Number);
const hora = h + (m/60);

if(hora >= 22.5 || hora <= 5){

if(base <= 24.99) return 5.00;

return base * 0.35;
}

return 0;
}

/* =========================
CÁLCULO PRINCIPAL
========================= */
function calcular(){

let base = parseFloat(valor) || 0;
let taxas = 0;
let detalhe = "";

/* BASE */
detalhe += `<div class="linha"><span>Corrida</span><span>R$ ${base.toFixed(2)}</span></div>`;

/* NOTURNO */
const noturno = adicionalNoturno(base);

if(noturno > 0){
detalhe += `<div class="linha"><span>Adicional Noturno</span><span>R$ ${noturno.toFixed(2)}</span></div>`;
base += noturno;
}

/* TAXAS */

if(feira > 0){
taxas += parseFloat(feira);
detalhe += `<div class="linha"><span>Tx Feira</span><span>R$ ${parseFloat(feira).toFixed(2)}</span></div>`;
}

if(animal > 0){
taxas += parseFloat(animal);
detalhe += `<div class="linha"><span>Animal</span><span>R$ ${parseFloat(animal).toFixed(2)}</span></div>`;
}

if(saidaPraia > 0){
taxas += parseFloat(saidaPraia);
detalhe += `<div class="linha"><span>Saída Praia</span><span>R$ ${parseFloat(saidaPraia).toFixed(2)}</span></div>`;
}

if(espera > 5){
const taxaEspera = 3 + ((espera - 5) * 0.60);
taxas += taxaEspera;
detalhe += `<div class="linha"><span>Espera</span><span>R$ ${taxaEspera.toFixed(2)}</span></div>`;
}

/* SUBTOTAL */
let subtotal = base + taxas;

/* VEÍCULO */
if(categoria > 1){
const acrescimo = subtotal * (categoria - 1);
detalhe += `<div class="linha"><span>Veículo 6 lugares</span><span>R$ ${acrescimo.toFixed(2)}</span></div>`;
subtotal *= categoria;
}

/* PAGAMENTO */
let pagamento = document.getElementById("pagamento").value;
let total = subtotal;

if(pagamento === "credito"){
total = subtotal / 0.95;
}

if(pagamento === "debito"){
total = subtotal / 0.98;
}

/* FINAL */
detalhe += `<div class="linha"><span>Pagamento</span><span>${pagamento}</span></div>`;
detalhe += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;

document.getElementById("detalhe").innerHTML = detalhe;
document.getElementById("valorFinal").innerText = "R$ " + total.toFixed(2);

localStorage.setItem("rf_total_final", total.toFixed(2));

}

/* EVENTO */
document.getElementById("pagamento").addEventListener("change", calcular);

/* INIT */
montarRota();
montarExtras();
calcular();

</script>

</body>
</html>
