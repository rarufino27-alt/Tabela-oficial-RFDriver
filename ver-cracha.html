<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Crachá RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:#e5e7eb;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:16px;
}

/* CARD */
.card{
  background:rgba(30,41,59,.6);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  padding:16px;
  text-align:center;
}

/* TITULO */
h2{
  margin-bottom:10px;
}

/* DESCRIÇÃO */
.desc{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:16px;
}

/* IMAGEM */
img{
  width:100%;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,.05);
}

/* BOTÃO */
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:bold;
  font-size:16px;
  color:#000;
}

/* INFO */
.info{
  font-size:13px;
  color:#94a3b8;
  margin-top:12px;
}

.loader{
  margin:30px 0;
  font-size:14px;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

  <div class="card">

    <h2>🚖 Crachá RF</h2>

    <div class="desc">
      Apresente este crachá aos passageiros para validação da corrida.
    </div>

    <div id="loading" class="loader">Carregando crachá...</div>

    <img id="imgCracha" style="display:none;">

    <button id="btnDownload" style="display:none;">📥 Baixar Crachá</button>

    <div class="info">
      Se o download não iniciar, pressione e segure na imagem para salvar.
    </div>

  </div>

</div>

<script>

/* =========================
📌 PEGAR ID
========================= */
function getId(){
  try{
    const url = new URL(window.location.href);
    return url.searchParams.get("id");
  }catch{
    return null;
  }
}

/* =========================
📌 CARREGAR CRACHÁ
========================= */
async function carregar(){

  const id = getId();

  if(!id){
    alert("Motorista não identificado");
    return;
  }

  const { data, error } = await window.supabaseClient
    .from("motoristas")
    .select("cracha_url")
    .eq("id", id)
    .single();

  if(error || !data || !data.cracha_url){
    console.error(error);
    alert("Crachá não disponível");
    return;
  }

  const img = document.getElementById("imgCracha");
  const btn = document.getElementById("btnDownload");
  const loading = document.getElementById("loading");

  img.src = data.cracha_url;

  img.onload = ()=>{
    loading.style.display = "none";
    img.style.display = "block";
    btn.style.display = "block";
  };

  btn.onclick = ()=>{
    const link = document.createElement("a");
    link.href = data.cracha_url;
    link.download = "cracha-rf.png";
    link.click();
  };

}

/* START */
carregar();

</script>

</body>
</html>
