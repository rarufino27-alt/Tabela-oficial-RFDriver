<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

</head>

<body>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>🚖 RF Motorista</h3>

  <div class="menu-item" onclick="ir('home.html')">📍 Tabela de Preços</div>
  <div class="menu-item" onclick="ir('bonus.html')">💰 Bônus Semanal</div>
  <div class="menu-item" onclick="ir('termos.html')">📜 Regras do Grupo</div>
  <div class="menu-item" onclick="ir('configuracoes.html')">⚙️ Configurações</div>
  <div class="menu-item" onclick="ir('grupo.html')">📊 Acompanhamento do Grupo</div>

  <div class="menu-item" onclick="logout()" style="color:#ef4444;">
    🚪 Sair
  </div>
</div>

<!-- HEADER -->
<div class="top-white">
  <div class="logo-area">
    <span class="logo-text-dark" id="saudacao">🚖 Olá</span>
  </div>

  <div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="center app-container">

<!-- NOME -->
<div class="card">
  <strong id="nomeMotorista"></strong>
</div>

<div id="bonusSemana"></div>
  
<select id="filtro" class="select">
  <option value="geral">Geral</option>
  <option value="semana">Semana</option>
  <option value="mes">Mês</option>
</select>

<div id="resumo"></div>

<div class="card">
  <canvas id="grafico"></canvas>
</div>

<div id="lista"></div>

</div>

<script>

/* =========================
🔐 AUTENTICAÇÃO
========================= */

function logout(){
  localStorage.clear();
  window.location.href = "login-motorista.html";
}

function verificarSessao(){

  const id = localStorage.getItem("motorista_id");
  const loginTime = localStorage.getItem("login_time");

  if(!id || !loginTime){
    logout();
    return;
  }

  const agora = Date.now();
  const tempo = agora - Number(loginTime);

  const LIMITE = 4 * 60 * 60 * 1000;

  if(tempo > LIMITE){
    logout();
  }else{
    localStorage.setItem("login_time", Date.now());
  }

}

verificarSessao();

/* =========================
MENU
========================= */

function abrirMenu(){
  document.getElementById("menu").classList.add("ativo");
  document.getElementById("menuOverlay").style.display = "block";
}

function fecharMenu(){
  document.getElementById("menu").classList.remove("ativo");
  document.getElementById("menuOverlay").style.display = "none";
}

/* =========================
USUÁRIO
========================= */

const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

function primeiroNome(nomeCompleto){
  return nomeCompleto?.split(" ")[0] || "Motorista";
}

const hora = new Date().getHours();
let saudacao = hora < 12 ? "Bom dia" :
               hora < 18 ? "Boa tarde" : "Boa noite";

document.getElementById("saudacao").innerText =
`🚖 ${saudacao}, ${primeiroNome(nome)}!`;

document.getElementById("nomeMotorista").innerText = nome;

/* NAV */
function ir(p){ window.location.href = p; }

/* =========================
DADOS
========================= */

let corridas = [];
let corridasGeral = [];
let chart = null;

async function carregar(){

  const { data: todas } = await window.supabaseClient
    .from("corridas")
    .select("*");

  corridasGeral = todas || [];

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId)
    .order("data_viagem", { ascending:false });

  corridas = data || [];

  gerar();
  gerarGrafico();
}

function filtrar(){

  const tipo = filtro.value;
  const hoje = new Date();

  if(tipo === "geral") return corridas;

  if(tipo === "semana"){
    const inicio = new Date();
    inicio.setDate(hoje.getDate() - hoje.getDay() + 1);

    const fim = new Date(inicio);
    fim.setDate(inicio.getDate() + 6);

    return corridas.filter(c=>{
      const d = new Date(c.data_viagem);
      return d >= inicio && d <= fim;
    });
  }

  if(tipo === "mes"){
    const mesAtual = hoje.toISOString().slice(0,7);
    return corridas.filter(c=>c.data_viagem?.startsWith(mesAtual));
  }

}

function gerar(){

  const listaFiltrada = filtrar();

  let total = 0;
  let finalizadas = 0;
  let canceladas = 0;

  listaFiltrada.forEach(c=>{
    if(c.status === "finalizada"){
      total += Number(c.valor);
      finalizadas++;
    }else{
      canceladas++;
    }
  });

  const naoAtendidas = corridasGeral.filter(c =>
    c.motorista_id !== motoristaId
  ).length;

  const media = listaFiltrada.length ? total / listaFiltrada.length : 0;

  resumo.innerHTML = `
    <div class="card">
      <div>Total viagens: ${listaFiltrada.length}</div>
      <div class="valor">R$ ${total.toFixed(2)}</div>
      <div class="small">Finalizadas: ${finalizadas}</div>
      <div class="small">Canceladas: ${canceladas}</div>
      <div class="small">Não atendidas: ${naoAtendidas}</div>
      <div class="small">Média: R$ ${media.toFixed(2)}</div>
    </div>
  `;

  lista.innerHTML = "";

  listaFiltrada.forEach(c=>{

    let rota = `${c.origem} → ${c.destino}`;

    if(c.parada){
      rota = `${c.origem} → 🛑 ${c.parada} → ${c.destino}`;
    }

    lista.innerHTML += `
      <div class="card">
        <div>${rota}</div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>
        <div class="small">
          📅 ${c.data_viagem || "-"} | 🕒 ${c.hora_viagem || "-"}
        </div>
      </div>
    `;
  });

}

function gerarGrafico(){

  let finalizadas = 0;
  let canceladas = 0;

  corridas.forEach(c=>{
    if(c.status === "finalizada") finalizadas++;
    else canceladas++;
  });

  const naoAtendidas = corridasGeral.filter(c =>
    c.motorista_id !== motoristaId
  ).length;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: ["Finalizadas", "Canceladas", "Não atendidas"],
      datasets: [{
        data: [finalizadas, canceladas, naoAtendidas]
      }]
    },
    options:{
      plugins:{
        legend:{ labels:{ color:"#fff" } }
      }
    }
  });

}

filtro.onchange = gerar;

gerarBonus();

carregar();

/* =========================
📅 PERÍODO SEMANAL
========================= */
function obterPeriodo(){

  const hoje = new Date();

  const dia = hoje.getDay(); // 0 = domingo

  const segunda = new Date(hoje);
  segunda.setDate(hoje.getDate() - (dia === 0 ? 6 : dia - 1));

  const sabado = new Date(segunda);
  sabado.setDate(segunda.getDate() + 5);

  const domingo = new Date(segunda);
  domingo.setDate(segunda.getDate() + 6);

  return {
    segunda,
    sabado,
    domingo
  };
}

/* =========================
🏆 RANKING + BONUS
========================= */
function gerarBonus(){

  const {segunda, sabado, domingo} = obterPeriodo();

  const inicio = segunda.toISOString().slice(0,10);
  const fim = sabado.toISOString().slice(0,10);
  const dom = domingo.toISOString().slice(0,10);

  const mapa = {};

  corridasGeral.forEach(c=>{

    if(!c.motorista_id) return;

    if(!mapa[c.motorista_id]){
      mapa[c.motorista_id] = 0;
    }

    if(c.status === "finalizada"){
      mapa[c.motorista_id]++;
    }

  });

  const ranking = Object.entries(mapa)
    .sort((a,b)=>b[1]-a[1]);

  const posicao = ranking.findIndex(r=>r[0] == motoristaId) + 1;

  document.getElementById("bonusSemana").innerHTML = `
    <div class="card-modern">
      <div style="font-size:13px;color:#9ca3af;">🏆 Bônus semanal</div>

      <div style="margin-top:6px;font-size:14px;">
        📅 ${inicio} até ${fim}
      </div>

      <div style="margin-top:6px;font-size:13px;color:#9ca3af;">
        Domingo: ${dom}
      </div>

      <div style="margin-top:10px;font-size:18px;font-weight:bold;color:#facc15;">
        Posição atual: ${posicao || "-"}º
      </div>
    </div>
  `;
}

</script>

</body>
</html>
