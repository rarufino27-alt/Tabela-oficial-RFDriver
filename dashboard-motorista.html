<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">

<style>

/* SAFE AREA */
html,body{
  margin:0;
  padding:0;
  padding-bottom: env(safe-area-inset-bottom);
  font-family:system-ui;
}

/* HEADER */
.header{
  background:#020617;
  padding:16px;
  margin-top:env(safe-area-inset-top);
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #334155;
}

.header span{
  font-weight:600;
}

/* CONTAINER */
.container{
  padding:16px;
}

/* RESUMO (tipo saldo) */
.resumo{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#000;
  padding:18px;
  border-radius:16px;
  margin-bottom:16px;
}

.resumo small{opacity:.7}
.resumo h1{margin:5px 0}

/* AÇÕES RÁPIDAS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:16px;
}

.card-btn{
  background:#020617;
  border:1px solid #334155;
  padding:16px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
}

/* BONUS */
.bonus{
  background:#020617;
  border:1px solid #3b82f6;
  padding:16px;
  border-radius:16px;
  margin-bottom:16px;
}

/* GRÁFICO */
.card{
  background:#020617;
  border:1px solid #334155;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* LISTA */
.item{
  background:#020617;
  border:1px solid #334155;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
}

.valor{
  color:#22c55e;
  font-weight:bold;
}

.data{
  font-size:12px;
  opacity:.6;
}

/* MENU */
.menu{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#020617;
  transition:.3s;
  padding:20px;
  z-index:999;
}

.menu.ativo{left:0;}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  display:none;
  z-index:998;
}

.menu div{
  padding:12px;
  border-bottom:1px solid #334155;
}

/* BOTÃO */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ef4444;
  color:#fff;
  margin-top:10px;
}

</style>

</head>

<body>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>RF</h3>
  <div onclick="ir('perfil.html')">Perfil</div>
  <div onclick="ir('cracha.html')">Crachá</div>
  <div onclick="ir('tabela-de-precos.html')">Tabela</div>
</div>

<div class="header">
  <span id="saudacao">🚖</span>
  <div onclick="abrirMenu()">☰</div>
</div>

<div class="container">

<!-- RESUMO -->
<div class="resumo">
  <small>Ganhos totais</small>
  <h1 id="total">R$ 0,00</h1>
</div>

<!-- AÇÕES -->
<div class="grid">
  <div class="card-btn" onclick="ir('cadastro.html')">
    👤 Cadastrar Motorista
  </div>
  <div class="card-btn" onclick="ir('cadastrar-corrida.html')">
    🚖 Nova Corrida
  </div>
</div>

<!-- BONUS -->
<div class="bonus" id="bonus"></div>

<!-- GRÁFICO -->
<div class="card">
  <canvas id="grafico"></canvas>
</div>

<!-- LISTA -->
<div id="lista"></div>

<button class="btn" onclick="logout()">Sair</button>

</div>

<script>

function abrirMenu(){
  menu.classList.add("ativo");
  overlay.style.display="block";
}

function fecharMenu(){
  menu.classList.remove("ativo");
  overlay.style.display="none";
}

function ir(p){ window.location.href = p; }

const id = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

document.getElementById("saudacao").innerText =
"🚖 Olá, " + (nome?.split(" ")[0] || "");

let corridas=[];
let chart;

async function carregar(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", id);

  corridas = data || [];

  gerar();
  grafico();
}

function gerar(){

  let total=0;

  corridas.forEach(c=>{
    total+=Number(c.valor||0);
  });

  document.getElementById("total").innerText =
    "R$ " + total.toFixed(2);

  lista.innerHTML="";

  corridas.forEach(c=>{
    lista.innerHTML+=`
      <div class="item">
        ${c.origem} → ${c.destino}
        <div class="valor">R$ ${c.valor}</div>
        <div class="data">${c.data_viagem}</div>
      </div>
    `;
  });

  document.getElementById("bonus").innerHTML =
    `🏆 Você possui ${corridas.length} corridas`;
}

function grafico(){

  let finalizadas = corridas.length;

  if(chart) chart.destroy();

  chart = new Chart(grafico,{
    type:"doughnut",
    data:{
      labels:["Corridas"],
      datasets:[{
        data:[finalizadas],
        backgroundColor:["#22c55e"]
      }]
    }
  });
}

function logout(){
  localStorage.clear();
  window.location.href="login-motorista.html";
}

carregar();

</script>

</body>
</html>
