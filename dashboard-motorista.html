<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:15px;
  background:#1e293b;
  text-align:left;
  font-weight:bold;
  font-size:18px;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:15px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  font-weight:600;
}

.valor{
  font-size:20px;
  font-weight:bold;
  color:#22c55e;
}

.small{
  font-size:13px;
  color:#94a3b8;
}

select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:#fff;
}

</style>

</head>

<body>

<div class="header">
  <div id="saudacao">🚖 Olá!</div>
</div>

<div class="container">

<div class="card">
  <strong id="nomeMotorista">-</strong>
</div>

<!-- 🔥 MENU -->
<div class="menu">

<button class="btn" onclick="ir('home.html')">
📍 Tabela de Preços
</button>

<button class="btn" onclick="ir('bonus.html')">
💰 Bônus
</button>

<button class="btn" onclick="ir('termos.html')">
📜 Regras
</button>

<button class="btn" onclick="ir('configuracoes.html')">
⚙️ Configurações
</button>

</div>

<select id="filtro">
  <option value="geral">Geral</option>
  <option value="semana">Semana</option>
  <option value="mes">Mês</option>
</select>

<div id="resumo"></div>

<div class="card">
  <canvas id="grafico"></canvas>
</div>

<div id="ranking"></div>

<div id="lista"></div>

<button class="btn" onclick="logout()" style="background:#ef4444;margin-top:10px;">
Sair
</button>

</div>

<script>

/* 🔐 PROTEÇÃO */
const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

if(!motoristaId){
  window.location.href = "login-motorista.html";
}

// 🔥 FUNÇÃO PRIMEIRO NOME
function primeiroNome(nomeCompleto){
  if(!nomeCompleto) return "Motorista";
  return nomeCompleto.split(" ")[0];
}

const primeiro = primeiroNome(nome);

// 🔥 SAUDAÇÃO INTELIGENTE (AQUI ENTRA O CÓDIGO)
const hora = new Date().getHours();

let saudacao = "Olá";

if(hora < 12) saudacao = "Bom dia";
else if(hora < 18) saudacao = "Boa tarde";
else saudacao = "Boa noite";

// 🔥 APLICAR NA TELA
document.getElementById("saudacao").innerText = `🚖 ${saudacao}, ${primeiro}!`;

// 🔥 NOME COMPLETO NO CARD
document.getElementById("nomeMotorista").innerText = nome;

// mantém nome completo no card
document.getElementById("nomeMotorista").innerText = nome;

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href = "login-motorista.html";
}

/* NAV */
function ir(p){
  window.location.href = p;
}

let corridas = [];

async function carregar(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId)
    .order("data_viagem", { ascending:false });

  corridas = data || [];

  gerar();
  gerarGrafico();
}

function filtrar(){

  const tipo = filtro.value;
  const hoje = new Date();

  if(tipo === "geral") return corridas;

  if(tipo === "semana"){
    const inicio = new Date();
    inicio.setDate(hoje.getDate() - hoje.getDay() + 1);

    const fim = new Date(inicio);
    fim.setDate(inicio.getDate() + 6);

    return corridas.filter(c=>{
      const d = new Date(c.data_viagem);
      return d >= inicio && d <= fim;
    });
  }

  if(tipo === "mes"){
    const mesAtual = hoje.toISOString().slice(0,7);
    return corridas.filter(c=>c.data_viagem?.startsWith(mesAtual));
  }

}

function gerar(){

  const listaFiltrada = filtrar();

  let total = 0;
  let canceladas = 0;

  listaFiltrada.forEach(c=>{
    if(c.status === "finalizada"){
      total += Number(c.valor);
    }else{
      canceladas++;
    }
  });

  const media = listaFiltrada.length ? total / listaFiltrada.length : 0;

  resumo.innerHTML = `
    <div class="card">
      <div>Total: ${listaFiltrada.length}</div>
      <div class="valor">R$ ${total.toFixed(2)}</div>
      <div class="small">Canceladas: ${canceladas}</div>
      <div class="small">Média: R$ ${media.toFixed(2)}</div>
    </div>
  `;

  lista.innerHTML = "";

  listaFiltrada.forEach(c=>{

    let rota = `${c.origem} → ${c.destino}`;
    if(c.parada){
      rota = `${c.origem} → 🛑 ${c.parada} → ${c.destino}`;
    }

    lista.innerHTML += `
      <div class="card">
        <div>${rota}</div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>
        <div class="small">
          📅 ${c.data_viagem || "-"} | 🕒 ${c.hora_viagem || "-"}
        </div>
      </div>
    `;
  });

}

function gerarGrafico(){

  let finalizadas = 0;
  let canceladas = 0;

  corridas.forEach(c=>{
    if(c.status === "finalizada"){
      finalizadas++;
    }else{
      canceladas++;
    }
  });

  new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: ["Finalizadas", "Canceladas"],
      datasets: [{
        data: [finalizadas, canceladas]
      }]
    }
  });

}

filtro.onchange = gerar;

carregar();

</script>

</body>
</html>
