<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* SAFE AREA (CORRIGIDO) */
html, body{
  margin:0;
  padding:0;
  padding-bottom: env(safe-area-inset-bottom);
}

/* HEADER */
.top-white{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  margin-top: env(safe-area-inset-top);
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
}

/* CONTAINER */
.app-container{
  padding:16px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
}

/* BLOCO GANHOS (NOVO VISUAL, MESMA LÓGICA) */
.resumo-destaque{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  color:#000;
}

/* BOTÕES AÇÃO */
.acoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.acao-btn{
  background:#020617;
  border:1px solid #334155;
  padding:14px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
}

/* BONUS */
.bonus-card{
  background:linear-gradient(135deg,#020617,#0f172a);
  border:1px solid var(--primary);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

/* LISTA */
.item-corrida{
  padding:16px;
  border-radius:16px;
  background:var(--bg-card);
  border:1px solid var(--border);
  margin-bottom:10px;
}

.valor{color:#22c55e;font-weight:bold;}
.data{font-size:12px;opacity:.6;}

</style>

</head>

<body>

<!-- MENU ORIGINAL -->
<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>RF</h3>
  <div class="menu-item" onclick="ir('perfil.html')">👤 Perfil</div>
  <div class="menu-item" onclick="ir('cracha.html')">🪪 Crachá</div>
  <div class="menu-item" onclick="ir('tabela-de-precos.html')">📍 Tabela</div>
  <div class="menu-item" onclick="ir('bonus.html')">💰 Bônus</div>
  <div class="menu-item" onclick="ir('configuracoes.html')">⚙️ Config</div>
  <div class="menu-item" onclick="ir('painel-motorista.html')">👤 Painel</div>
</div>

<!-- HEADER -->
<div class="top-white">
  <span id="saudacao">🚖</span>
  <div onclick="abrirMenu()">☰</div>
</div>

<div class="app-container">

<!-- GANHOS (APENAS VISUAL) -->
<div class="resumo-destaque" id="resumoTopo"></div>

<!-- AÇÕES -->
<div class="acoes">
  <div class="acao-btn" onclick="ir('cadastro.html')">👤 Motorista</div>
  <div class="acao-btn" onclick="ir('cadastrar-corrida.html')">🚖 Corrida</div>
</div>

<!-- BONUS ORIGINAL -->
<div class="bonus-card" id="bonusCard"></div>

<!-- FILTRO ORIGINAL -->
<select id="filtro" class="select">
  <option value="geral">Geral</option>
  <option value="semana">Semana</option>
  <option value="mes">Mês</option>
</select>

<!-- RESUMO ORIGINAL -->
<div id="resumo"></div>

<!-- GRÁFICO ORIGINAL -->
<div class="card">
  <canvas id="grafico"></canvas>
</div>

<!-- LISTA ORIGINAL -->
<div id="lista"></div>

<button class="btn-perigo" onclick="logout()">Sair</button>

</div>

<script>

/* MENU ORIGINAL */
function abrirMenu(){
  menu.classList.add("ativo");
  menuOverlay.style.display="block";
}

function fecharMenu(){
  menu.classList.remove("ativo");
  menuOverlay.style.display="none";
}

function ir(p){ window.location.href = p; }

/* LOGIN ORIGINAL */
if(!localStorage.getItem("motorista_id")){
  window.location.href="login-motorista.html";
}

const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

/* SAUDAÇÃO ORIGINAL */
const hora = new Date().getHours();
let saudacao = hora < 12 ? "Bom dia" :
               hora < 18 ? "Boa tarde" : "Boa noite";

document.getElementById("saudacao").innerText =
`🚖 ${saudacao}, ${nome?.split(" ")[0] || ""}!`;

/* DADOS ORIGINAIS */
let corridas = [];
let corridasGeral = [];
let chart = null;

/* BONUS ORIGINAL */
async function carregarBonus(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("motorista_id, data_viagem");

  if(!data) return;

  const ranking = {};

  data.forEach(c=>{
    ranking[c.motorista_id] = (ranking[c.motorista_id] || 0) + 1;
  });

  const lista = Object.entries(ranking)
    .map(([id, total]) => ({ id, total }))
    .sort((a,b)=>b.total - a.total);

  const posicao = lista.findIndex(x => x.id == motoristaId) + 1;
  const minhasCorridas = ranking[motoristaId] || 0;

  bonusCard.innerHTML = `
    <div class="bonus-title">🏆 Ranking</div>
    <div class="bonus-value">${posicao || "-"}º lugar</div>
    <div class="bonus-sub">${minhasCorridas} corridas</div>
  `;
}

/* CARREGAR ORIGINAL */
async function carregar(){

  const { data: todas } = await window.supabaseClient
    .from("corridas")
    .select("*");

  corridasGeral = todas || [];

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId)
    .order("data_viagem",{ascending:false});

  corridas = data || [];

  gerar();
  gerarGrafico();
}

/* GERAR ORIGINAL */
function gerar(){

  const listaFiltrada = corridas;

  let total=0;

  listaFiltrada.forEach(c=>{
    total += Number(c.valor || 0);
  });

  document.getElementById("resumoTopo").innerHTML =
    `<strong>Ganhos</strong><h2>R$ ${total.toFixed(2)}</h2>`;

  lista.innerHTML="";

  listaFiltrada.forEach(c=>{
    lista.innerHTML+=`
      <div class="item-corrida">
        <div>${c.origem} → ${c.destino}</div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>
        <div class="data">${c.data_viagem || "-"} • ${c.hora_viagem || ""}</div>
      </div>
    `;
  });
}

/* GRÁFICO ORIGINAL */
function gerarGrafico(){

  let finalizadas = corridas.length;

  if(chart) chart.destroy();

  chart = new Chart(grafico,{
    type:"doughnut",
    data:{
      labels:["Corridas"],
      datasets:[{
        data:[finalizadas],
        backgroundColor:["#22c55e"]
      }]
    }
  });
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="login-motorista.html";
}

/* START */
carregar();
carregarBonus();

</script>

</body>
</html>
