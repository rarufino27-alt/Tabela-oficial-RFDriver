<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - RF</title>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* DARK */
:root[data-theme="dark"]{
  --bg-main:#0B0F14;
  --bg-card:#121821;
  --bg-soft:#0F141B;

  --text-primary:#fff;
  --text-secondary:#9CA3AF;

  --border:rgba(255,255,255,0.08);
  --primary:#3B82F6;
}

/* LIGHT (CORPORATIVO) */
:root[data-theme="light"]{
  --bg-main:#F4F7FB;
  --bg-card:#FFFFFF;
  --bg-soft:#F1F5F9;

  --text-primary:#0f172a;
  --text-secondary:#475569;

  --border:#E2E8F0;
  --primary:#3B82F6;
}

/* BASE */
body{
  background:var(--bg-main);
  color:var(--text-primary);
  transition:.25s;
}

/* HEADER */
.top-white{
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
}

/* TÍTULO */
.page-title{
  font-size:20px;
  font-weight:800;
  text-align:center;
  margin:20px 0;
}

/* CARD */
.card-modern{
  padding:18px;
  border-radius:16px;
  margin-bottom:16px;
  background:var(--bg-card);
  border:1px solid var(--border);
}

/* OPÇÕES */
.option-modern{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:10px;
  cursor:pointer;
}

.option-modern:hover{
  background:var(--bg-soft);
}

/* BADGE */
.badge{
  background:var(--primary);
  color:#fff;
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

/* SWITCH */
.switch{
  position:relative;
  width:42px;
  height:22px;
}

.switch input{
  display:none;
}

.slider{
  position:absolute;
  background:#ccc;
  border-radius:20px;
  width:100%;
  height:100%;
}

.slider::before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:white;
  top:2px;
  left:2px;
  transition:.3s;
}

input:checked + .slider{
  background:var(--primary);
}

input:checked + .slider::before{
  transform:translateX(20px);
}

</style>

</head>

<body>

<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="center app-container">

<div class="page-title">⚙️ Configurações</div>

<!-- PREFERÊNCIAS -->
<div class="card-modern">

<div class="section-title">Preferências</div>

<div class="option-modern">
  <span>🎨 Tema</span>

  <label class="switch">
    <input type="checkbox" id="toggleTema">
    <span class="slider"></span>
  </label>
</div>

</div>

<!-- SISTEMA -->
<div class="card-modern">

<div class="section-title">Sistema</div>

<div class="option-modern">
  <span>Versão do aplicativo</span>
  <span class="badge">2.0.0</span>
</div>

<div class="option-modern" onclick="abrirSuporte()">
  <span>💬 Suporte</span>
  <span>WhatsApp</span>
</div>

</div>

</div>

<script>

/* 🔥 TEMA GLOBAL (CORRETO) */
(function(){
  const tema = localStorage.getItem("rf_theme") || "dark";
  document.documentElement.setAttribute("data-theme", tema);
})();

/* SWITCH */
const toggle = document.getElementById("toggleTema");

const temaAtual = localStorage.getItem("rf_theme") || "dark";
toggle.checked = temaAtual === "dark";

toggle.addEventListener("change", () => {
  const novo = toggle.checked ? "dark" : "light";
  localStorage.setItem("rf_theme", novo);
  document.documentElement.setAttribute("data-theme", novo);
});

/* SUPORTE */
function abrirSuporte(){
  const msg = encodeURIComponent("Olá, preciso de suporte no app RF.");
  window.open(`https://wa.me/5581989823239?text=${msg}`);
}

</script>

</body>
</html>
