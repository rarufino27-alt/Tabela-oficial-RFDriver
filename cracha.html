<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Crachá RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  background:#020617;
  font-family:system-ui;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  width:90%;
  max-width:400px;
  background:#0f172a;
  border:1px solid #334155;
  border-radius:16px;
  padding:20px;
  text-align:center;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

  <h2>🚖 Crachá RF</h2>
  <p>Toque abaixo para visualizar seu crachá</p>

  <button onclick="abrirCracha()">📥 Ver / Baixar Crachá</button>

</div>

<script>

function getMotoristaId(){

  // 1️⃣ tenta pegar da URL
  const url = new URL(window.location.href);
  let id = url.searchParams.get("id");

  // 2️⃣ tenta pegar do localStorage
  if(!id){
    id = localStorage.getItem("motorista_id");
  }

  // 3️⃣ fallback TEMPORÁRIO (teste)
  if(!id){
    id = "3ae6e7b1-a4bb-4020-8c39-291d24dee681"; // seu ID atual
  }

  return id;
}

function abrirCracha(){

  const id = getMotoristaId();

  if(!id){
    alert("Motorista não identificado");
    return;
  }

  const url = `https://rarufino27-alt.github.io/Tabela-oficial-RFDriver/ver-cracha.html?id=${id}`;

  // 🔥 FORÇA SAIR DO APP (FUNCIONA NO APPGEYSER)
  window.location.href = url;

}

</script>

</body>
</html>
