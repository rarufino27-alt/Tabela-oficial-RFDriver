<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Crachá RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  background:#020617;
  font-family:system-ui;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:400px;
  background:#0f172a;
  border:1px solid #334155;
  border-radius:16px;
  padding:20px;
  text-align:center;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

  <h2>🚖 Crachá RF</h2>

  <p>Toque abaixo para visualizar seu crachá</p>

  <button onclick="abrirCracha()">📥 Ver / Baixar Crachá</button>

</div>

<script>

function getMotoristaId(){
  try{
    const url = new URL(window.location.href);
    return url.searchParams.get("id") || localStorage.getItem("motorista_id");
  }catch{
    return localStorage.getItem("motorista_id");
  }
}

function abrirCracha(){

  const id = localStorage.getItem("motorista_id");

  if(!id){
    alert("Motorista não identificado");
    return;
  }

  const pagina = `https://rarufino27-alt.github.io/Tabela-oficial-RFDrive/ver-cracha.html?id=${id}`;

  if(window.cordova){
    window.open(pagina, "_system");
  }else{
    window.open(pagina, "_blank");
  }

}

</script>

</body>
</html>
