<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<script src="core/datamanager.js"></script>

<style>
.app-container{
  padding-bottom:120px;
}
</style>

</head>

<body>

<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="app-container">

  <!-- ROTA -->
  <div class="card-modern">

    <div class="campo">
      <div class="campo-left">
        <div class="dot origem"></div>
        <span id="origem"></span>
      </div>
    </div>

    <div class="campo" id="paradaBox" style="display:none;">
      <div class="campo-left">
        <div class="dot" style="background:#facc15"></div>
        <span id="parada"></span>
      </div>
    </div>

    <div class="campo">
      <div class="campo-left">
        <div class="dot destino"></div>
        <span id="destino"></span>
      </div>
    </div>

  </div>

  <!-- RESUMO -->
  <div class="card-modern">
    <h3>Resumo da viagem</h3>
    <div id="detalhes"></div>
  </div>

  <!-- TAXAS -->
  <div class="card-modern">
    <h3>Taxas adicionais</h3>
    <div id="taxas"></div>
  </div>

  <!-- PAGAMENTO -->
  <div class="card-modern">

    <h3>Forma de pagamento</h3>

    <div class="veiculos">

      <div class="veiculo ativo pagamento" data="dinheiro">
        💵
        <strong>Dinheiro</strong>
      </div>

      <div class="veiculo pagamento" data="pix">
        ⚡
        <strong>PIX</strong>
      </div>

      <div class="veiculo pagamento" data="credito">
        💳
        <strong>Crédito</strong>
      </div>

      <div class="veiculo pagamento" data="debito">
        🏧
        <strong>Débito</strong>
      </div>

    </div>

  </div>

</div>

<!-- CTA -->
<div class="cta-box">

  <div>
    <span>Total</span>
    <strong id="total">R$ 0,00</strong>
  </div>

  <button onclick="wpp()">
    WHATSAPP →
  </button>

</div>

<script>

/* ===== TEMA ===== */
(function(){
  const tema = localStorage.getItem("rf_theme") || "light";
  document.body.setAttribute("data-theme", tema);
})();

/* ===== INIT ===== */
async function init(){
  await DataManager.carregar();
  carregarResumo();
}
init();

/* ===== DADOS ===== */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!d){
  alert("Erro: dados não encontrados");
  window.location.href="home.html";
}

/* ===== CARREGAR ===== */
function carregarResumo(){

  /* ROTA */
  document.getElementById("origem").innerText = d.origem;
  document.getElementById("destino").innerText = d.destino;

  let base = 0;

  if(d.parada){

    document.getElementById("paradaBox").style.display = "flex";
    document.getElementById("parada").innerText = d.parada;

    const v1 = DataManager.buscarValor(d.origem, d.parada) || 0;
    const v2 = DataManager.buscarValor(d.parada, d.destino) || 0;

    base = v1 + v2;

  }else{
    base = DataManager.buscarValor(d.origem, d.destino) || 0;
  }

  /* DETALHES */
  document.getElementById("detalhes").innerHTML = `
    <div class="linha"><span>Veículo</span><span>${d.categoria>1?"6 lugares":"4 lugares"}</span></div>
    <div class="linha"><span>Embarque</span><span>${d.embarque || "-"}</span></div>
    <div class="linha"><span>Obs</span><span>${d.obs || "-"}</span></div>
  `;

  /* TAXAS */
  let taxas = 0;
  let html = "";

  function add(nome,val){
    if(val>0){
      taxas += val;
      html += `<div class="linha"><span>${nome}</span><span>R$ ${val.toFixed(2)}</span></div>`;
    }
  }

  add("Feira", +d.feira || 0);
  add("Animal", +d.animal || 0);
  add("Saída Praia", +d.saidaPraia || 0);

  if(d.espera > 5){
    let esperaCalc = 3 + ((d.espera - 5) * 0.6);
    add("Espera", esperaCalc);
  }

  /* NOTURNO */
  if(d.embarque){
    let [h,m] = d.embarque.split(":");
    let hora = +h + (m/60);

    if(hora >= 22.5 || hora <= 5){
      let adicional = base <= 24.99 ? 4.99 : base * 0.35;
      add("Adicional Noturno", adicional);
    }
  }

  document.getElementById("taxas").innerHTML = html;

  /* PAGAMENTO */
  let pagamento = "dinheiro";

  document.querySelectorAll(".pagamento").forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll(".pagamento").forEach(b=>b.classList.remove("ativo"));
      btn.classList.add("ativo");
      pagamento = btn.getAttribute("data");
      calcular();
    };
  });

  function calcular(){

    let total = base + taxas;

    if(pagamento==="credito") total /= 0.95;
    if(pagamento==="debito") total /= 0.98;

    document.getElementById("total").innerText = "R$ " + total.toFixed(2);

    localStorage.setItem("rf_total_final", total.toFixed(2));
  }

  calcular();
}

/* ===== WHATS ===== */
function wpp(){

  const total = parseFloat(localStorage.getItem("rf_total_final") || 0).toFixed(2);

  let base = 0;

  if(d.parada){
    const v1 = DataManager.buscarValor(d.origem, d.parada) || 0;
    const v2 = DataManager.buscarValor(d.parada, d.destino) || 0;
    base = v1 + v2;
  }else{
    base = DataManager.buscarValor(d.origem, d.destino) || 0;
  }

  let taxas = 0;
  let detalhes = "";

  function add(nome, emoji, val){
    if(val > 0){
      taxas += val;
      detalhes += `${emoji}${nome.padEnd(18," ")} ${val.toFixed(2)}\n`;
    }
  }

  add("Feira", "🛒", +d.feira || 0);
  add("Saída de Praia", "⛱️", +d.saidaPraia || 0);
  add("Animal", "🐶", +d.animal || 0);

  if(d.espera > 5){
    let esperaCalc = 3 + ((d.espera - 5) * 0.6);
    add("Espera", "⏱️", esperaCalc);
  }

  // NOTURNO
  if(d.embarque){
    let [h,m] = d.embarque.split(":");
    let hora = +h + (m/60);

    if(hora >= 22.5 || hora <= 5){
      let adicional = base <= 24.99 ? 4.99 : base * 0.35;
      add("Adicional Noturno", "🌙", adicional);
    }
  }

  const pagamentoTexto = {
    dinheiro: "Dinheiro",
    pix: "PIX",
    credito: "Crédito",
    debito: "Débito"
  };

  let pagamentoSelecionado = document.querySelector(".pagamento.ativo")?.getAttribute("data") || "dinheiro";

  let msg = `🚖 *Orçamento RF*

📌 *Origem*
- ${d.origem}

`;

  if(d.parada){
    msg += `🛑 *Parada*
- ${d.parada}

`;
  }

  msg += `🏁 *Destino*
- ${d.destino}

`;

  msg += ` *Subtotal* - R$ ${base.toFixed(2)}

`;

  msg += `*Detalhes da viagem*

${detalhes}

`;

  msg += ` *Subtotal* - R$ ${taxas.toFixed(2)}

`;

  msg += `💳 *Pagamento* ${pagamentoTexto[pagamentoSelecionado]}

`;

  msg += `💰 *Total* R$ ${total}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
