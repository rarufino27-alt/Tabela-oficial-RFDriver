<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

.container{
max-width:420px;
margin:20px auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

.card{
background:var(--bg-card);
border-radius:16px;
padding:16px;
box-shadow:var(--shadow-soft);
}

.rota{
display:flex;
justify-content:space-between;
align-items:center;
}

.label{
font-size:12px;
color:var(--text-secondary);
}

.nome{
font-weight:bold;
}

.linha{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
font-size:26px;
font-weight:bold;
color:var(--primary);
}

.pagamentos{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.pagamento{
padding:12px;
border-radius:10px;
border:1px solid var(--border);
text-align:center;
cursor:pointer;
}

.pagamento.ativo{
border:1px solid var(--primary);
color:var(--primary);
}

.botoes{
display:flex;
gap:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
}

.btn-wpp{
background:#16a34a;
color:#fff;
}

.btn-pdf{
background:var(--primary);
color:#000;
}

</style>

</head>

<body data-theme="dark">

<!-- HEADER -->
<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="container">

<div class="card rota">
<div>
<div class="label">Origem</div>
<div class="nome" id="origem"></div>
</div>

<div>→</div>

<div>
<div class="label">Destino</div>
<div class="nome" id="destino"></div>
</div>
</div>

<div class="card">
<h3>Resumo da viagem</h3>
<div id="detalhes"></div>
</div>

<div class="card">
<h3>Taxas adicionais</h3>
<div id="taxas"></div>
</div>

<div class="card">
<h3>Forma de pagamento</h3>

<div class="pagamentos">
<div class="pagamento ativo">Dinheiro</div>
<div class="pagamento">PIX</div>
<div class="pagamento">Crédito</div>
<div class="pagamento">Débito</div>
</div>
</div>

<div class="card">
<div>Total da viagem</div>
<div class="total" id="total"></div>

<div id="resumoValores"></div>
</div>

<div class="botoes">
<button class="btn-wpp" onclick="wpp()">WhatsApp</button>
<button class="btn-pdf" onclick="pdf()">PDF</button>
</div>

</div>

<script>

const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!d){
alert("Erro");
location.href="home.html";
}

origem.innerText = d.origem;
destino.innerText = d.destino;

detalhes.innerHTML = `
Veículo: ${d.categoria>1?"6 lugares":"4 lugares"}<br>
Embarque: ${d.embarque || "-"}<br>
Obs: ${d.obs || "-"}
`;

taxas.innerHTML = `
<div class="linha"><span>Feira</span><span>R$ ${d.feira}</span></div>
<div class="linha"><span>Animal</span><span>R$ ${d.animal}</span></div>
<div class="linha"><span>Saída Praia</span><span>R$ ${d.saidaPraia}</span></div>
`;

total.innerText = d.total;

resumoValores.innerHTML = `
<div>Base: R$ ${d.base}</div>
<div>Taxas: R$ ${d.taxas}</div>
`;

function wpp(){
let msg = `🚗 RF DRIVER

${d.origem} → ${d.destino}

💰 ${d.total}`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

function pdf(){
window.open("https://backend-recibo-rf.onrender.com");
}

</script>

</body>
</html>
