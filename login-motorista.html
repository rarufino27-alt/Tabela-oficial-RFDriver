<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Login • Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

/* =========================
🎯 THEME
========================= */
:root{
  --bg-main:#0B0F14;
  --bg-card:#121821;
  --bg-soft:#0F141B;

  --primary:#3B82F6;
  --green:#22C55E;

  --text:#FFFFFF;
  --text-secondary:#9CA3AF;

  --border:rgba(255,255,255,0.08);
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* =========================
BODY
========================= */
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top,#111827,#020617);
  color:var(--text);
}

/* FUNDO SUAVE */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle, rgba(59,130,246,.15), transparent 60%);
  animation:rotateBg 25s linear infinite;
}

@keyframes rotateBg{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* =========================
CARD
========================= */
.card{
  width:90%;
  max-width:360px;
  background:var(--bg-card);
  padding:26px;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:0 20px 40px rgba(0,0,0,.5);
  position:relative;
  z-index:2;
  text-align:center;
}

/* LOGO */
.logo{
  width:70px;
  margin-bottom:15px;
}

/* TITULO */
.titulo{
  font-size:18px;
  font-weight:700;
  margin-bottom:5px;
}

.sub{
  font-size:13px;
  color:var(--text-secondary);
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg-soft);
  color:var(--text);
  margin-bottom:14px;
  font-size:15px;
}

/* BOTÃO */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:15px;
  transition:.2s;
}

button:hover{
  filter:brightness(1.1);
}

button:active{
  transform:scale(0.97);
}

/* STATUS */
.msg{
  margin-top:12px;
  font-size:13px;
  color:var(--text-secondary);
}

</style>

</head>

<body>

<div class="card">

  <img src="icons/icon-192.png" class="logo">

  <div class="titulo">
    Escritório Virtual RF
  </div>

  <div class="sub">
    Acesso do motorista
  </div>

  <input id="telefone" placeholder="Digite seu telefone">

  <button onclick="login()">Entrar</button>

  <div id="msg" class="msg"></div>

</div>

<script>

async function login(){

  const msg = document.getElementById("msg");
  msg.innerText = "";

  const telInput = document.getElementById("telefone").value;

  if(!telInput){
    msg.innerText = "Digite o telefone";
    return;
  }

  const tel = telInput.replace(/\D/g, "");

  msg.innerText = "Verificando acesso...";

  const { data, error } = await window.supabaseClient
    .from("motoristas")
    .select("*")
    .or(`telefone1.eq.${tel},telefone2.eq.${tel}`);

  if(error){
    console.error(error);
    msg.innerText = "Erro ao conectar";
    return;
  }

  if(!data || data.length === 0){
    msg.innerText = "Motorista não encontrado";
    return;
  }

  localStorage.setItem("motorista_id", data[0].id);
  localStorage.setItem("motorista_nome", data[0].nome);

  msg.innerText = "Acesso liberado...";

  setTimeout(()=>{
    window.location.href = "dashboard-motorista.html";
  },800);

}

</script>

</body>
</html>
