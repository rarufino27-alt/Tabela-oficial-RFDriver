<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Pagamento não recebido</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

.container{
  width:92%;
  max-width:420px;
  margin:20px auto 100px;
}

.titulo{
  text-align:center;
  font-size:20px;
  font-weight:800;
  margin-bottom:14px;
}

.opcao{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  margin-top:8px;
  cursor:pointer;
  text-align:center;
}

.opcao.ativo{
  background:#ffd700;
  color:#000;
  font-weight:700;
}

.input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

.botao-final{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:14px;
  background:#111;
}

</style>

</head>

<body>

<div class="container">

<div class="titulo">Pagamento não recebido</div>

<div class="card">
<p style="font-size:13px;opacity:.8">

O grupo garante pagamento apenas para viagens de <b>IDA</b>.

<br><br>

Após o prazo estipulado pelo passageiro, caso não haja pagamento, o motorista deve acionar a administração.

</p>
</div>

<div class="card">
<h3>Já passou o prazo?</h3>

<div class="opcao" data-valor="sim">Sim</div>
<div class="opcao" data-valor="nao">Não</div>

<input type="text" id="tempo" class="input" placeholder="Quanto tempo passou?" style="display:none;">

</div>

</div>

<div class="botao-final">
<button onclick="continuar()">Continuar</button>
</div>

<script>

let resposta = null;

document.querySelectorAll(".opcao").forEach(btn=>{

  btn.onclick=()=>{

    document.querySelectorAll(".opcao").forEach(b=>b.classList.remove("ativo"));

    btn.classList.add("ativo");

    resposta = btn.dataset.valor;

    if(resposta === "sim"){
      document.getElementById("tempo").style.display = "block";
    }else{
      document.getElementById("tempo").style.display = "none";
    }

  };

});

function continuar(){

  if(!resposta){
    alert("Selecione uma opção");
    return;
  }

  if(resposta === "nao"){
    alert("Aguarde o prazo informado pelo passageiro.");
    window.location.href = "home.html";
    return;
  }

  const tempo = document.getElementById("tempo").value || "Não informado";

  const mensagem = encodeURIComponent(
`🚨 PAGAMENTO NÃO RECEBIDO

Prazo ultrapassado: Sim
Tempo decorrido: ${tempo}

Solicito verificação do caso.`
  );

  window.location.href = `https://wa.me/5581989823239?text=${mensagem}`;

}

(function(){
const tema = localStorage.getItem("rf_theme") || "dark";
document.body.setAttribute("data-theme", tema);
})();

</script>

</body>
</html>
