<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

</head>

<body>

<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="app-container">

  <!-- ROTA -->
  <div class="card-modern">

    <div class="campo">
      <div class="campo-left">
        <div class="dot origem"></div>
        <span id="origem"></span>
      </div>
    </div>

    <div class="campo">
      <div class="campo-left">
        <div class="dot destino"></div>
        <span id="destino"></span>
      </div>
    </div>

  </div>

  <!-- RESUMO -->
  <div class="card-modern">
    <h3>Resumo da viagem</h3>
    <div id="detalhes"></div>
  </div>

  <!-- TAXAS -->
  <div class="card-modern">
    <h3>Taxas adicionais</h3>
    <div id="taxas"></div>
  </div>

  <!-- PAGAMENTO -->
  <div class="card-modern">

    <h3>Forma de pagamento</h3>

    <div class="veiculos">

      <div class="veiculo ativo pagamento" data="dinheiro">
        💵
        <strong>Dinheiro</strong>
      </div>

      <div class="veiculo pagamento" data="pix">
        ⚡
        <strong>PIX</strong>
      </div>

      <div class="veiculo pagamento" data="credito">
        💳
        <strong>Crédito</strong>
      </div>

      <div class="veiculo pagamento" data="debito">
        🏧
        <strong>Débito</strong>
      </div>

    </div>

  </div>

</div>

<!-- CTA IGUAL HOME -->
<div class="cta-box">

  <div>
    <span>Total</span>
    <strong id="total">R$ 0,00</strong>
  </div>

  <button onclick="wpp()">
    WHATSAPP →
  </button>

</div>

<script>

/* ===== TEMA GLOBAL ===== */
(function(){
  const tema = localStorage.getItem("rf_theme") || "light";
  document.body.setAttribute("data-theme", tema);
})();

/* ===== DADOS ===== */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!d){
  alert("Erro: dados não encontrados");
  window.location.href="home.html";
}

/* ===== ROTA ===== */
document.getElementById("origem").innerText = d.origem;
document.getElementById("destino").innerText = d.destino;

/* ===== DETALHES ===== */
document.getElementById("detalhes").innerHTML = `
<div class="linha"><span>Veículo</span><span>${d.categoria>1?"6 lugares":"4 lugares"}</span></div>
<div class="linha"><span>Embarque</span><span>${d.embarque || "-"}</span></div>
<div class="linha"><span>Obs</span><span>${d.obs || "-"}</span></div>
`;

/* ===== TAXAS ===== */
let base = parseFloat(d.valor) || 0;
let taxas = 0;
let html = "";

function add(nome,val){
  if(val>0){
    taxas += val;
    html += `<div class="linha"><span>${nome}</span><span>R$ ${val.toFixed(2)}</span></div>`;
  }
}

add("Feira", +d.feira || 0);
add("Animal", +d.animal || 0);
add("Saída Praia", +d.saidaPraia || 0);

if(d.espera>5){
  let t = 3 + ((d.espera-5)*0.6);
  add("Espera", t);
}

/* NOTURNO */
if(d.embarque){
  let [h,m] = d.embarque.split(":");
  let hora = +h + (m/60);

  if(hora>=22.5 || hora<=5){
    let n = base<=24.99 ? 4.99 : base*0.35;
    add("Noturno", n);
  }
}

document.getElementById("taxas").innerHTML = html;

/* ===== PAGAMENTO ===== */
let pagamento = "dinheiro";

document.querySelectorAll(".pagamento").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".pagamento").forEach(b=>b.classList.remove("ativo"));
    btn.classList.add("ativo");
    pagamento = btn.getAttribute("data");
    calcular();
  };
});

/* ===== CALCULO ===== */
function calcular(){

  let total = base + taxas;

  if(pagamento==="credito") total /= 0.95;
  if(pagamento==="debito") total /= 0.98;

  document.getElementById("total").innerText = "R$ " + total.toFixed(2);

  localStorage.setItem("rf_total_final", total.toFixed(2));
}

calcular();

/* ===== WHATS ===== */
function wpp(){

  let total = localStorage.getItem("rf_total_final");

  let msg = `🚗 *RF DRIVER*

📍 ${d.origem} → ${d.destino}
💰 R$ ${total}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
