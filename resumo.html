<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* ===== CONTAINER ===== */
.resumo-container{
width:92%;
max-width:420px;
margin:20px auto 120px;
display:flex;
flex-direction:column;
gap:16px;
}

/* ===== ROTA ===== */
.rota-box{
border-radius:20px;
padding:16px;
border:1px solid rgba(255,255,255,.1);
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.rota-col{
flex:1;
}

.rota-titulo{
font-size:12px;
opacity:.6;
}

.rota-nome{
font-weight:700;
}

.rota-end{
font-size:12px;
opacity:.6;
}

/* ===== CARD ===== */
.card-premium{
border-radius:20px;
padding:18px;
border:1px solid rgba(255,255,255,.1);
background:rgba(0,0,0,.6);
}

/* ===== GRID ===== */
.grid{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

.grid div{
flex:1;
text-align:center;
}

/* ===== TAXAS ===== */
.taxa{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px dashed rgba(255,255,255,.1);
}

/* ===== PAGAMENTO ===== */
.pagamento-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.pagamento{
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.1);
text-align:center;
cursor:pointer;
}

.pagamento.ativo{
border:1px solid #facc15;
}

/* ===== TOTAL ===== */
.total-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.total-box strong{
font-size:28px;
color:#facc15;
}

/* ===== BOTÕES ===== */
.botoes{
display:flex;
gap:10px;
}

.botoes button{
flex:1;
padding:14px;
border-radius:12px;
font-weight:bold;
border:none;
}

.btn-wpp{
background:#16a34a;
color:#fff;
}

.btn-pdf{
background:#facc15;
color:#000;
}

</style>
</head>

<body>

<div class="top-white">
<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">RF MOTORISTA</span>
</div>
</div>

<div class="resumo-container">

<!-- ROTA -->
<div class="rota-box" id="rotaBox"></div>

<!-- DETALHES -->
<div class="card-premium">
<h3>Detalhes selecionados</h3>
<div class="grid" id="detalhes"></div>
</div>

<!-- TAXAS -->
<div class="card-premium">
<h3>Taxas adicionais</h3>
<div id="taxas"></div>
</div>

<!-- PAGAMENTO -->
<div class="card-premium">
<h3>Forma de pagamento</h3>
<div class="pagamento-grid">
<div class="pagamento ativo" data="dinheiro">Dinheiro</div>
<div class="pagamento" data="pix">PIX</div>
<div class="pagamento" data="credito">Crédito</div>
<div class="pagamento" data="debito">Débito</div>
</div>
</div>

<!-- TOTAL -->
<div class="card-premium">
<div class="total-box">
<div>
<div>Total da viagem</div>
<strong id="total">R$ 0,00</strong>
</div>
<div id="resumoValores"></div>
</div>
</div>

<div class="botoes">
<button class="btn-wpp" onclick="wpp()">WhatsApp</button>
<button class="btn-pdf" onclick="pdf()">PDF</button>
</div>

</div>

<script>

/* TEMA */
document.body.setAttribute("data-theme", localStorage.getItem("rf_theme")||"dark");

const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));

/* ROTA */
document.getElementById("rotaBox").innerHTML = `
<div class="rota-col">
<div class="rota-titulo">Origem</div>
<div class="rota-nome">${d.origem}</div>
</div>

<div>→</div>

<div class="rota-col">
<div class="rota-titulo">Destino</div>
<div class="rota-nome">${d.destino}</div>
</div>
`;

/* DETALHES */
document.getElementById("detalhes").innerHTML = `
<div>${d.categoria>1?"6 lugares":"4 lugares"}</div>
<div>${d.embarque||"-"}</div>
<div>1 passageiro</div>
`;

/* TAXAS */
let base = parseFloat(d.valor);
let taxasHTML="";
let taxas=0;

function add(nome,val){
if(val>0){
taxas+=val;
taxasHTML+=`<div class="taxa"><span>${nome}</span><span>R$ ${val.toFixed(2)}</span></div>`;
}
}

add("Feira",+d.feira||0);
add("Animal",+d.animal||0);
add("Saída praia",+d.saidaPraia||0);

if(d.espera>5){
let t=3+((d.espera-5)*0.6);
add("Espera",t);
}

/* NOTURNO */
if(d.embarque){
let [h,m]=d.embarque.split(":");
let hora=+h+(m/60);

if(hora>=22.5||hora<=5){
let n=base<=24.99?4.99:base*0.35;
add("Noturno",n);
}
}

document.getElementById("taxas").innerHTML=taxasHTML;

/* PAGAMENTO */
let tipo="dinheiro";

document.querySelectorAll(".pagamento").forEach(el=>{
el.onclick=()=>{
document.querySelectorAll(".pagamento").forEach(x=>x.classList.remove("ativo"));
el.classList.add("ativo");
tipo=el.getAttribute("data");
calcular();
};
});

/* CALCULO */
function calcular(){

let total = base + taxas;

if(tipo==="credito") total/=0.95;
if(tipo==="debito") total/=0.98;

document.getElementById("total").innerText="R$ "+total.toFixed(2);

document.getElementById("resumoValores").innerHTML=`
<div>Base: R$ ${base.toFixed(2)}</div>
<div>Taxas: R$ ${taxas.toFixed(2)}</div>
`;
}

calcular();

/* WPP */
function wpp(){
let total=document.getElementById("total").innerText;

let msg=`🚗 RF\n${d.origem} → ${d.destino}\n💰 ${total}`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* PDF */
async function pdf(){

let total=document.getElementById("total").innerText;

const res = await fetch("https://backend-recibo-rf.onrender.com/gerar-recibo",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
origem:d.origem,
destino:d.destino,
total
})
});

const r = await res.json();

window.open(`https://wa.me/?text=${encodeURIComponent("Recibo:\n"+r.link)}`);
}

</script>

</body>
</html>
