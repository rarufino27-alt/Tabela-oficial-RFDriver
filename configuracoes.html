<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - RF</title>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* TÍTULO */
.page-title{
  font-size:22px;
  font-weight:800;
  text-align:center;
  margin:20px 0 10px;
}

/* SUBTÍTULO */
.section-title{
  font-size:14px;
  opacity:.7;
  margin-bottom:10px;
}

/* OPÇÃO */
.option-modern{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

.option-modern:last-child{
  border:none;
}

.option-modern:hover{
  opacity:.85;
}

/* BADGE */
.badge{
  background:var(--primary);
  color:#000;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:800;
}

/* BOTÃO VOLTAR */
.voltar{
  text-align:center;
  margin-top:25px;
  color:var(--primary);
  font-weight:700;
  cursor:pointer;
}

/* MELHORIA VISUAL CARD */
.card-modern{
  padding:18px;
  border-radius:18px;
  margin-bottom:14px;

  background:var(--bg-card);
  border:1px solid var(--border);

  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

body[data-theme="light"] .card-modern{
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="app-container">

<div class="page-title">⚙️ Configurações</div>

<!-- PREFERÊNCIAS -->
<div class="card-modern">

  <div class="section-title">Preferências</div>

  <div class="option-modern" onclick="alternarTema()">
    <span>Alternar tema</span>
    <strong id="temaAtual"></strong>
  </div>

</div>

<!-- SISTEMA -->
<div class="card-modern">

  <div class="section-title">Sistema</div>

  <div class="option-modern">
    <span>Versão do aplicativo</span>
    <span class="badge">1.0.1</span>
  </div>

  <div class="option-modern" onclick="abrirSuporte()">
    <span>Contato do suporte</span>
    <span>WhatsApp</span>
  </div>

</div>

<div class="voltar" onclick="window.location.href='index.html'">
← Voltar
</div>

</div>

<script>

/* =========================
CARREGAR TEMA
========================= */
(function(){
  const tema = localStorage.getItem("rf_theme") || "dark";
  document.body.setAttribute("data-theme", tema);
})();

/* =========================
ALTERNAR TEMA
========================= */
function alternarTema(){

const atual = document.body.getAttribute("data-theme");

const novo = atual === "dark" ? "light" : "dark";

document.body.setAttribute("data-theme", novo);

localStorage.setItem("rf_theme", novo);

atualizarLabel();

}

/* =========================
LABEL
========================= */
function atualizarLabel(){

const atual = document.body.getAttribute("data-theme");

document.getElementById("temaAtual").innerText =
atual === "dark" ? "🌙 Escuro" : "☀️ Claro";

}

/* =========================
SUPORTE
========================= */
function abrirSuporte(){

const mensagem = encodeURIComponent("Olá, preciso de suporte no aplicativo RF.");

window.open(`https://wa.me/5581989823239?text=${mensagem}`, "_blank");

}

</script>

</body>
</html>
