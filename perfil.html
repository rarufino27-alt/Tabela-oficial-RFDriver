<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Perfil Motorista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
}

/* HEADER */
.header{
  padding:16px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  background:#0f172a;
  border-bottom:1px solid #1e293b;
}

/* CONTAINER */
.container{
  padding:15px;
  max-width:600px;
  margin:auto;
}

/* CARD */
.card{
  background:#0f172a;
  padding:16px;
  border-radius:14px;
  border:1px solid #1e293b;
  margin-bottom:12px;
}

/* TITULO */
.titulo{
  font-size:14px;
  margin-bottom:10px;
  color:#94a3b8;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

/* BLOQUEADO */
.block{
  opacity:0.6;
}

/* BOTÃO */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.save{
  background:#22c55e;
  color:#000;
}

/* INFO */
.info{
  font-size:13px;
  color:#94a3b8;
  text-align:center;
  margin-top:10px;
}

</style>

</head>

<body>

<div class="header">👤 Meu Perfil</div>

<div class="container">

<!-- DADOS PESSOAIS -->
<div class="card">

<div class="titulo">Dados Pessoais</div>

<input id="nome" disabled class="block">
<input id="telefone" disabled class="block">
<input id="endereco">

</div>

<!-- VEÍCULO -->
<div class="card">

<div class="titulo">Veículo</div>

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="cor" placeholder="Cor">
<input id="placa" placeholder="Placa">

</div>

<button class="save" onclick="salvar()">Salvar Alterações</button>

<div class="info">
Alterações de nome ou telefone devem ser solicitadas à administração.
</div>

</div>

<script>

/* =========================
VALIDAÇÃO LOGIN
========================= */
const motoristaId = localStorage.getItem("motorista_id");

if(!motoristaId){
  window.location.href = "login-motorista.html";
}

/* =========================
CARREGAR DADOS
========================= */
async function carregar(){

  const { data, error } = await window.supabaseClient
    .from("motoristas")
    .select("*")
    .eq("id", motoristaId)
    .single();

  if(error){
    console.log(error);
    alert("Erro ao carregar perfil");
    return;
  }

  // pessoais
  nome.value = data.nome || "";
  telefone.value = data.telefone || "";
  endereco.value = data.endereco || "";

  // veículo
  marca.value = data.marca || "";
  modelo.value = data.modelo || "";
  cor.value = data.cor || "";
  placa.value = data.placa || "";
}

/* =========================
SALVAR
========================= */
async function salvar(){

  const data = {
    endereco: endereco.value.trim(),

    marca: marca.value.trim(),
    modelo: modelo.value.trim(),
    cor: cor.value.trim(),
    placa: placa.value.trim()
  };

  const { error } = await window.supabaseClient
    .from("motoristas")
    .update(data)
    .eq("id", motoristaId);

  if(error){
    console.log(error);
    alert("Erro ao salvar");
    return;
  }

  alert("Dados atualizados com sucesso");
}

/* START */
carregar();

</script>

</body>
</html>
