<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* SAFE AREA */
html, body{
  margin:0;
  padding:0;
  padding-bottom: env(safe-area-inset-bottom);
}

/* BASE */
body{
  line-height:1.4;
  letter-spacing:0.3px;
}

.app-container{
  padding:16px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
}

/* HEADER */
.top-white{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  margin-top: env(safe-area-inset-top);
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#020617;
  transition:.3s;
  z-index:999;
  padding:20px;
}

.menu.ativo{
  left:0;
}

.menu-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  display:none;
  z-index:998;
}

.menu-item{
  padding:12px;
  border-bottom:1px solid #334155;
  cursor:pointer;
}

/* CARD */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

/* BONUS */
.bonus-card{
  background:linear-gradient(135deg,#020617,#0f172a);
  border:1px solid var(--primary);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.bonus-title{font-size:13px;opacity:.7;}
.bonus-value{font-size:20px;font-weight:800;color:var(--primary);}
.bonus-sub{font-size:13px;color:var(--text-secondary);}

/* KPI */
.kpi{
  padding:16px;
  border-radius:16px;
  background:var(--bg-card);
  border:1px solid var(--border);
}

.kpi.ganho{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#000;
}

.kpi-value{
  font-size:24px;
  font-weight:800;
}

.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* LISTA */
.item-corrida{
  padding:16px;
  border-radius:16px;
  background:var(--bg-card);
  border:1px solid var(--border);
  margin-bottom:10px;
}

.valor{font-size:18px;font-weight:800;color:var(--primary);}
.data{font-size:12px;color:var(--text-secondary);}

/* INPUT */
.select{
  margin-bottom:12px;
  padding:12px;
}

/* BOTÃO */
.btn-perigo{
  margin-top:12px;
  padding:14px;
  border-radius:12px;
}

</style>

</head>

<body>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>RF</h3>
  <div class="menu-item" onclick="ir('perfil.html')">Perfil</div>
  <div class="menu-item" onclick="ir('cracha.html')">Crachá</div>
  <div class="menu-item" onclick="ir('tabela-de-precos.html')">Tabela</div>
  <div class="menu-item" onclick="ir('bonus.html')">Bônus</div>
</div>

<div class="top-white">
  <span id="saudacao">🚖</span>
  <div onclick="abrirMenu()">☰</div>
</div>

<div class="app-container">

<div class="card"><strong id="nomeMotorista"></strong></div>

<div class="bonus-card" id="bonusCard"></div>

<select id="filtro" class="select">
<option value="geral">Geral</option>
<option value="semana">Semana</option>
<option value="mes">Mês</option>
</select>

<div id="resumo"></div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div id="lista"></div>

<button class="btn-perigo" onclick="logout()">Sair</button>

</div>

<script>

function abrirMenu(){
  menu.classList.add("ativo");
  menuOverlay.style.display="block";
}

function fecharMenu(){
  menu.classList.remove("ativo");
  menuOverlay.style.display="none";
}

function ir(p){ window.location.href = p; }

const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

nomeMotorista.innerText = nome || "";

let corridas = [];
let chart;

async function carregar(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId);

  corridas = data || [];

  gerar();
  gerarGrafico();
}

function gerar(){

  let total = 0;

  corridas.forEach(c=> total += Number(c.valor||0));

  resumo.innerHTML = `
    <div class="kpi ganho">
      <div>Ganhos</div>
      <div class="kpi-value">R$ ${total.toFixed(2)}</div>
    </div>
  `;

  lista.innerHTML="";

  corridas.forEach(c=>{
    lista.innerHTML += `
      <div class="item-corrida">
        <div>${c.origem} → ${c.destino}</div>
        <div class="valor">R$ ${c.valor}</div>
        <div class="data">${c.data_viagem}</div>
      </div>
    `;
  });
}

function gerarGrafico(){

  let total = corridas.length;

  if(chart) chart.destroy();

  chart = new Chart(grafico,{
    type:"doughnut",
    data:{
      labels:["Corridas"],
      datasets:[{
        data:[total],
        backgroundColor:["#22c55e"]
      }]
    }
  });
}

function logout(){
  localStorage.clear();
  window.location.href="login-motorista.html";
}

carregar();

</script>

</body>
</html>
