<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Crachá RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:#e5e7eb;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:16px;
}

.card{
  background:rgba(30,41,59,.6);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  padding:16px;
  text-align:center;
}

img{
  width:100%;
  border-radius:12px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:bold;
  font-size:16px;
  color:#000;
}

</style>

</head>

<body>

<div class="container">

  <div class="card">

    <h2>🚖 Crachá RF</h2>

    <img id="imgCracha">

    <button onclick="baixar()">📥 Baixar Crachá</button>

  </div>

</div>

<script>

function getId(){
  // 🔥 pega do storage (não usa URL)
  return localStorage.getItem("cracha_id");
}

async function carregar(){

  const id = getId();

  if(!id){
    alert("Motorista não identificado");
    return;
  }

  const { data, error } = await window.supabaseClient
    .from("motoristas")
    .select("cracha_url")
    .eq("id", id)
    .single();

  if(error || !data || !data.cracha_url){
    console.error(error);
    alert("Crachá não disponível");
    return;
  }

  document.getElementById("imgCracha").src = data.cracha_url;

}

function baixar(){

  const url = document.getElementById("imgCracha").src;

  const link = document.createElement("a");
  link.href = url;
  link.download = "cracha-rf.png";
  link.click();

}

document.addEventListener("DOMContentLoaded", carregar);

</script>

</body>
</html>
