<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>GFV – Viagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<link rel="stylesheet" href="theme.css/theme.css">
<link rel="stylesheet" href="theme.css/layout.css">
<link rel="stylesheet" href="theme.css/components.css">

</head>

<body>

<div id="loading" class="loading">
<div class="loader"></div>
<span>Carregando rotas...</span>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>

<div class="menu-item" onclick="irPara('termos.html')">
📜 Regras do Grupo GFV
</div>

<div class="menu-item" onclick="irPara('configuracoes.html')">
⚙️ Configurações
</div>

</div>

<div class="top-white">
<div class="logo-area">
<img src="icons/logo-1024.png" class="logo-img" onerror="this.src='icons/icon-512.png'">
<span class="logo-text-dark">GFV MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="center">

<div class="titulo-central">
Para onde <span>vamos</span> hoje?
</div>

<div class="card">

<div class="campo" id="origemBtn">
<div class="campo-left">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>
</div>

<div class="campo" id="paradaBtn" style="display:none;">
<div class="campo-left">
<div class="dot parada"></div>
<div id="paradaTexto">Selecionar parada</div>
</div>
</div>

<div class="campo" id="destinoBtn">
<div class="campo-left">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>
<div class="plus" id="addParada">＋</div>
</div>

<div class="campo">
<div class="campo-left">
<div class="dot" style="background:#3b82f6;"></div>
<div>Tipo de veículo</div>
</div>

<div class="rf-select" id="tipoCarroBtn">
<span id="tipoCarroTexto">4 lugares</span>
</div>

<input type="hidden" id="tipoCarro" value="1">
</div>

</div>
</div>

<div class="bottom">
<button id="confirmar" disabled>Confirmar rota</button>
</div>

<!-- MODAL LISTA -->
<div class="modal" id="modal">
<div class="modal-content">
<input type="text" id="busca" placeholder="Buscar local...">
<div class="lista" id="lista"></div>
</div>
</div>

<!-- MODAL VEÍCULO CENTRALIZADO -->
<div id="modalTipoCarro" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
">

<div style="
background:#1c1c1c;
padding:20px;
border-radius:16px;
width:90%;
max-width:300px;
border:1px solid rgba(255,255,255,.1);
">

<div class="rf-option" data-value="1">4 lugares</div>
<div class="rf-option" data-value="1.5">6 lugares (+50%)</div>

</div>
</div>

<script>

/* INIT */
async function init(){
const loading = document.getElementById("loading");
loading.style.display="flex";
try{
await DataManager.carregar();
}catch(e){
alert("Erro ao carregar rotas.");
}
loading.style.display="none";
}
init();

/* MENU */
function abrirMenu(){
menu.classList.add("ativo");
menuOverlay.style.display="block";
}
function fecharMenu(){
menu.classList.remove("ativo");
menuOverlay.style.display="none";
}
function irPara(p){
window.location.href=p;
}

/* SISTEMA COMPLETO (RF TRAZIDO PRO GFV) */

let origem=null,parada=null,destino=null,modo=null;

const modal=document.getElementById("modal");
const lista=document.getElementById("lista");
const busca=document.getElementById("busca");
const confirmarBtn=document.getElementById("confirmar");

function abrirModal(tipo){
if(tipo!=="origem"&&!origem){
alert("Selecione a origem primeiro.");
return;
}

modo=tipo;
busca.value="";
modal.style.display="flex";

let dados=[];

if(tipo==="origem"){
dados=DataManager.listarOrigens();
}

if(tipo==="parada"){
dados=DataManager.listarDestinos(origem);
}

if(tipo==="destino"){
dados=parada
? DataManager.listarDestinos(parada)
: DataManager.listarDestinos(origem);
}

renderLista(dados);
}

function renderLista(arr){
lista.innerHTML="";
arr.forEach(item=>{
const div=document.createElement("div");
div.innerText=item;
div.onclick=()=>{
selecionar(item);
modal.style.display="none";
};
lista.appendChild(div);
});
}

busca.addEventListener("input",()=>{
const termo=busca.value.toLowerCase();
Array.from(lista.children).forEach(div=>{
div.style.display=div.innerText.toLowerCase().includes(termo)?"block":"none";
});
});

function selecionar(valor){

if(modo==="origem"){
origem=valor;
parada=null;
destino=null;

origemTexto.innerText=valor;
paradaTexto.innerText="Selecionar parada";
destinoTexto.innerText="Selecionar destino";

paradaBtn.style.display="none";
}

if(modo==="parada"){
parada=valor;
destino=null;
paradaTexto.innerText=valor;
}

if(modo==="destino"){
destino=valor;
destinoTexto.innerText=valor;
}

confirmarBtn.disabled=!(origem&&destino);
}

origemBtn.onclick=()=>abrirModal("origem");
paradaBtn.onclick=()=>abrirModal("parada");
destinoBtn.onclick=()=>abrirModal("destino");

addParada.onclick=e=>{
e.stopPropagation();
if(!origem){
alert("Selecione a origem primeiro.");
return;
}
paradaBtn.style.display="flex";
};

/* TIPO VEÍCULO */

const modalTipo=document.getElementById("modalTipoCarro");

tipoCarroBtn.onclick=()=>modalTipo.style.display="flex";

modalTipo.onclick=e=>{
if(e.target===modalTipo) modalTipo.style.display="none";
};

document.querySelectorAll(".rf-option").forEach(op=>{
op.onclick=()=>{
tipoCarro.value=op.dataset.value;
tipoCarroTexto.innerText=op.innerText;
modalTipo.style.display="none";
};
});

/* CONFIRMAR */

confirmarBtn.onclick=()=>{

let valorTotal=0;

if(!parada){
valorTotal=DataManager.buscarValor(origem,destino)||0;
}else{
valorTotal=
(DataManager.buscarValor(origem,parada)||0)
+
(DataManager.buscarValor(parada,destino)||0);
}

const tipo=parseFloat(tipoCarro.value);

localStorage.setItem("gfv_corrida_temp",JSON.stringify({
origem,parada,destino,valor:valorTotal,categoria:tipo
}));

window.location.href="resumo.html";
};

/* TEMA */
(function(){
const temaSalvo=localStorage.getItem("rf_theme")||"dark";
document.body.setAttribute("data-theme",temaSalvo);
})();

</script>

</body>
</html>
