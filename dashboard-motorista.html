<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">

<style>

/* SAFE AREA */
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:#fff;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  margin-top:10px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

/* CONTAINER */
.container{
  padding:16px;
  padding-bottom: calc(90px + env(safe-area-inset-bottom));
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#020617;
  border-right:1px solid #1e293b;
  transition:.3s;
  z-index:999;
  padding:16px;
}

.menu.ativo{
  left:0;
}

.menu-item{
  padding:14px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  z-index:998;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.kpi-card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:16px;
  border-radius:16px;
}

/* GRID */
.main-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
}

@media(max-width:768px){
  .main-grid{
    grid-template-columns:1fr;
  }
}

/* CARD */
.card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

/* RANKING */
.bonus-card{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#000;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

/* AÇÕES */
.acoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.acao-btn{
  background:#020617;
  border:1px solid #334155;
  padding:14px;
  border-radius:14px;
  text-align:center;
}

/* LISTA */
.item-corrida{
  padding:14px;
  border-radius:14px;
  background:#020617;
  border:1px solid #1e293b;
  margin-bottom:8px;
}

.valor{color:#22c55e;font-weight:bold;}
.data{font-size:12px;opacity:.6;}

</style>

</head>

<body>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>RF</h3>
  <div class="menu-item" onclick="ir('perfil.html')">👤 Perfil</div>
  <div class="menu-item" onclick="ir('cracha.html')">🪪 Crachá</div>
  <div class="menu-item" onclick="ir('tabela-de-precos.html')">📍 Tabela</div>
  <div class="menu-item" onclick="ir('bonus.html')">💰 Bônus</div>
  <div class="menu-item" onclick="ir('configuracoes.html')">⚙️ Config</div>
  <div class="menu-item" onclick="ir('painel-motorista.html')">👤 Painel</div>
</div>

<!-- HEADER -->
<div class="header">
  <span id="saudacao"></span>
  <div onclick="abrirMenu()">☰</div>
</div>

<div class="container">

<!-- KPI -->
<div class="kpi-grid">
  <div class="kpi-card" id="kpiGanhos"></div>
  <div class="kpi-card" id="kpiCorridas"></div>
</div>

<!-- GRID -->
<div class="main-grid">

  <div>
    <div class="card">
      <canvas id="grafico"></canvas>
    </div>

    <div class="card">
      <div id="lista"></div>
    </div>
  </div>

  <div>
    <div class="bonus-card" id="bonusCard"></div>

    <div class="acoes">
      <div class="acao-btn" onclick="ir('cadastro.html')">👤 Motorista</div>
      <div class="acao-btn" onclick="ir('cadastrar-corrida.html')">🚖 Corrida</div>
    </div>
  </div>

</div>

</div>

<script>

/* MENU */
function abrirMenu(){
  menu.classList.add("ativo");
  menuOverlay.style.display="block";
}

function fecharMenu(){
  menu.classList.remove("ativo");
  menuOverlay.style.display="none";
}

/* LOGIN */
if(!localStorage.getItem("motorista_id")){
  window.location.href="login-motorista.html";
}

const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

/* SAUDAÇÃO */
const hora = new Date().getHours();
let saudacao = hora < 12 ? "Bom dia" :
               hora < 18 ? "Boa tarde" : "Boa noite";

saudacaoEl.innerText =
`🚖 ${saudacao}, ${nome?.split(" ")[0] || ""}`;

/* DADOS */
let corridas = [];
let chart = null;

/* BONUS */
async function carregarBonus(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("motorista_id");

  const ranking = {};

  data.forEach(c=>{
    ranking[c.motorista_id] = (ranking[c.motorista_id] || 0) + 1;
  });

  const lista = Object.entries(ranking)
    .map(([id, total]) => ({ id, total }))
    .sort((a,b)=>b.total - a.total);

  const posicao = lista.findIndex(x => x.id == motoristaId) + 1;

  bonusCard.innerHTML = `🏆 ${posicao || "-"}º lugar`;
}

/* CARREGAR */
async function carregar(){

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId)
    .order("data_viagem",{ascending:false});

  corridas = data || [];

  gerar();
  gerarGrafico();
}

/* GERAR */
function gerar(){

  let total=0;

  corridas.forEach(c=>{
    total += Number(c.valor || 0);
  });

  kpiGanhos.innerHTML =
    `<span>Ganhos</span><h2>R$ ${total.toFixed(2)}</h2>`;

  kpiCorridas.innerHTML =
    `<span>Corridas</span><h2>${corridas.length}</h2>`;

  lista.innerHTML="";

  corridas.forEach(c=>{
    lista.innerHTML+=`
      <div class="item-corrida">
        <div>${c.origem} → ${c.destino}</div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>
        <div class="data">${c.data_viagem || "-"}</div>
      </div>
    `;
  });
}

/* GRÁFICO */
function gerarGrafico(){

  if(chart) chart.destroy();

  chart = new Chart(grafico,{
    type:"bar",
    data:{
      labels:["Corridas"],
      datasets:[{
        data:[corridas.length],
        backgroundColor:"#22c55e"
      }]
    }
  });
}

function ir(p){ window.location.href = p; }

function logout(){
  localStorage.clear();
  window.location.href="login-motorista.html";
}

/* START */
carregar();
carregarBonus();

</script>

</body>
</html>
