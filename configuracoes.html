<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - RF</title>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* AJUSTES VISUAIS */
.page-title{
  font-size:20px;
  font-weight:800;
  margin:15px 0 5px;
  text-align:center;
}

.option-modern{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

.option-modern:last-child{
  border:none;
}

.option-modern:hover{
  opacity:.8;
}

.badge{
  font-size:12px;
  background:var(--primary);
  color:#000;
  padding:4px 10px;
  border-radius:20px;
  font-weight:bold;
}

.link-voltar{
  display:block;
  text-align:center;
  margin-top:20px;
  color:var(--primary);
  font-weight:600;
}

</style>

</head>

<body>

<!-- HEADER PADRÃO -->
<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="app-container">

<div class="page-title">⚙️ Configurações</div>

<!-- PREFERÊNCIAS -->
<div class="card-modern">

  <h3>Preferências</h3>

  <div class="option-modern" onclick="alternarTema()">
    <span>Alternar tema</span>
    <span id="temaAtual"></span>
  </div>

</div>

<!-- SISTEMA -->
<div class="card-modern">

  <h3>Sistema</h3>

  <div class="option-modern">
    <span>Versão do aplicativo</span>
    <span class="badge">1.0.1</span>
  </div>

  <div class="option-modern" onclick="abrirSuporte()">
    <span>Contato do suporte</span>
    <span>WhatsApp</span>
  </div>

</div>

<a href="index.html" class="link-voltar">← Voltar</a>

</div>

<script>

/* =========================
CARREGAR TEMA
========================= */
(function(){

const temaSalvo = localStorage.getItem("rf_theme") || "dark";

document.body.setAttribute("data-theme", temaSalvo);

atualizarLabel();

})();

/* =========================
ALTERNAR TEMA
========================= */
function alternarTema(){

const atual = document.body.getAttribute("data-theme");

const novo = atual === "dark" ? "light" : "dark";

document.body.setAttribute("data-theme", novo);

localStorage.setItem("rf_theme", novo);

atualizarLabel();

}

/* =========================
LABEL TEMA
========================= */
function atualizarLabel(){

const atual = document.body.getAttribute("data-theme");

document.getElementById("temaAtual").innerText =
atual === "dark" ? "🌙 Escuro" : "☀️ Claro";

}

/* =========================
SUPORTE
========================= */
function abrirSuporte(){

const mensagem = encodeURIComponent("Olá, preciso de suporte no aplicativo RF.");

window.open(`https://wa.me/5581989823239?text=${mensagem}`, "_blank");

}

</script>

</body>
</html>
