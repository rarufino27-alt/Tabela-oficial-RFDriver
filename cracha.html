<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Crachá RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="core/supabase.js"></script>

<style>

body{
  margin:0;
  background:#020617;
  font-family:system-ui;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CARD */
#container{
  width:100%;
  max-width:400px;
  padding:20px;
}

/* CARD INFO */
.card{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:16px;
  padding:20px;
  text-align:center;
}

/* NOME */
.nome{
  font-size:20px;
  font-weight:bold;
}

/* STATUS */
.status{
  margin-top:8px;
  font-size:13px;
  padding:6px 12px;
  border-radius:20px;
  display:inline-block;
}

.ativo{
  background:#16a34a;
}

.inativo{
  background:#dc2626;
}

/* VEICULO */
.info{
  margin-top:15px;
  font-size:14px;
  opacity:.8;
}

/* BOTÃO */
button{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  margin-top:15px;
  border-radius:12px;
  overflow:hidden;
}

.preview img{
  width:100%;
  border-radius:12px;
}

</style>

</head>

<body>

<div id="container">

  <div class="card">

    <div class="nome" id="nome">...</div>

    <div id="status" class="status">...</div>

    <div class="info" id="carro"></div>
    <div class="info" id="placa"></div>

    <button id="btnCracha">📥 Baixar Crachá</button>

    <div class="preview" id="preview"></div>

  </div>

</div>

<script>

/* =========================
📌 OBTER ID
========================= */
function getMotoristaId(){
  try{
    const url = new URL(window.location.href);
    return url.searchParams.get("id") || localStorage.getItem("motorista_id");
  }catch{
    return localStorage.getItem("motorista_id");
  }
}

/* =========================
📌 REDIRECIONAR DIRETO
========================= */
async function carregar(){

  const id = getMotoristaId();

  if(!id){
    alert("Motorista não identificado");
    return;
  }

  const { data, error } = await window.supabaseClient
    .from("motoristas")
    .select("cracha_url")
    .eq("id", id)
    .single();

  if(error || !data || !data.cracha_url){
    console.error(error);
    alert("Crachá não disponível");
    return;
  }

  const url = data.cracha_url;

  // 🔥 FORÇA abrir fora do app (APK)
  if(window.cordova){
    window.open(url, "_system");
  }else{
    window.open(url, "_blank");
  }

  // opcional: voltar ou fechar tela
  setTimeout(()=>{
    window.history.back();
  }, 1000);

}

/* START */
document.addEventListener("DOMContentLoaded", carregar);

</script>
</body>
</html>
