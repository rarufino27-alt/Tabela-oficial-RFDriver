<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Motorista RF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="core/supabase.js"></script>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* HEADER PADRÃO */
.top-white{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* MENU GRID */
.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

/* KPI */
.kpi{
  padding:14px;
  border-radius:14px;
  background:var(--bg-card);
  border:1px solid var(--border);
}

.kpi strong{
  font-size:18px;
  display:block;
}

.kpi span{
  font-size:12px;
  color:var(--text-secondary);
}

.kpi.total{
  background:linear-gradient(135deg,var(--primary),#60a5fa);
  color:#000;
}

/* LISTA */
.item-corrida{
  padding:14px;
  border-radius:14px;
  background:var(--bg-card);
  border:1px solid var(--border);
  margin-bottom:10px;
}

.rota{ font-weight:600; }
.valor{
  font-size:18px;
  font-weight:800;
  color:var(--primary);
}
.data{
  font-size:12px;
  color:var(--text-secondary);
}

.bonus-card{
  background: linear-gradient(135deg,#0f172a,#020617);
  border:1px solid var(--primary);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
}

.bonus-title{
  font-size:13px;
  opacity:.7;
}

.bonus-value{
  font-size:20px;
  font-weight:800;
  color:var(--primary);
}

.bonus-sub{
  font-size:13px;
  color:var(--text-secondary);
  margin-top:4px;
}

/* CONTAINER */
.resumo-box{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:12px;
}

/* GANHO PRINCIPAL */
.kpi.ganho{
  padding:18px;
  border-radius:18px;

  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#000;

  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.kpi-top{
  font-size:13px;
  opacity:.8;
}

.kpi-value{
  font-size:24px;
  font-weight:800;
}

/* GRID */
.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* CARDS */
.kpi{
  padding:14px;
  border-radius:14px;

  background:var(--bg-card);
  border:1px solid var(--border);

  transition:.2s;
}

.kpi:hover{
  transform:translateY(-2px);
}

/* DIFERENCIAÇÃO VISUAL */
.kpi:nth-child(2){
  border-left:3px solid #ef4444;
}

.kpi:nth-child(3){
  border-left:3px solid #3b82f6;
}

.kpi:nth-child(4){
  border-left:3px solid #facc15;
}

</style>

</head>

<body>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>RF</h3>

  <div class="menu-item" onclick="ir('tabela-de-precos.html')">📍 Tabela de Preços</div>
  <div class="menu-item" onclick="ir('bonus.html')">💰 Bônus semanal</div>
  <div class="menu-item" onclick="ir('regras-do-grupo.html')">📜 Regras do grupo</div>
  <div class="menu-item" onclick="ir('configuracoes.html')">⚙️ Configurações</div>
  <div class="menu-item" onclick="ir('painel-motorista.html')">👤 Painel do Motorista</div>
</div>

<!-- HEADER -->
<div class="top-white">
  <div class="logo-area">
    <span class="logo-text-dark" id="saudacao">🚖</span>
  </div>

  <div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="center app-container">

<!-- NOME -->
<div class="card">
  <strong id="nomeMotorista"></strong>
</div>

<!-- BONUS FIXO (PERSUASIVO) -->
<div class="bonus-card destaque-card">

  <div class="bonus-content">
    <div class="bonus-title">🏆 Bônus semanal</div>
    <div class="bonus-value">Ganhe até R$100</div>
    <div class="bonus-sub">
      Quanto mais corridas você fizer, maiores suas chances de liderar o ranking.
    </div>
  </div>

</div>

<!-- BONUS DINÂMICO (RANKING REAL) -->
<div class="bonus-card destaque-card" id="bonusCard"></div>

<select id="filtro" class="select">
  <option value="geral">Geral</option>
  <option value="semana">Semana</option>
  <option value="mes">Mês</option>
</select>

<!-- RESUMO -->
<div id="resumo"></div>

<!-- GRÁFICO -->
<div class="card">
  <canvas id="grafico"></canvas>
</div>

<!-- LISTA -->
<div id="lista"></div>

<button class="btn-perigo" onclick="logout()">Sair</button>

</div>

<script>

async function carregarBonus(){

  const hoje = new Date();

  // SEGUNDA A SÁBADO
  const inicioSemana = new Date();
  inicioSemana.setDate(hoje.getDate() - hoje.getDay() + 1);

  const fimSemana = new Date(inicioSemana);
  fimSemana.setDate(inicioSemana.getDate() + 5);

  // DOMINGO
  const domingo = new Date();
  domingo.setDate(hoje.getDate() - hoje.getDay());

  const dataInicio = inicioSemana.toISOString().slice(0,10);
  const dataFim = fimSemana.toISOString().slice(0,10);
  const dataDomingo = domingo.toISOString().slice(0,10);

  // BUSCAR CORRIDAS
  const { data } = await window.supabaseClient
    .from("corridas")
    .select("motorista_id, data_viagem");

  if(!data) return;

  // FILTRAR SEMANA
  const semana = data.filter(c =>
    c.data_viagem >= dataInicio &&
    c.data_viagem <= dataFim
  );

  // AGRUPAR
  const ranking = {};

  semana.forEach(c=>{
    ranking[c.motorista_id] = (ranking[c.motorista_id] || 0) + 1;
  });

  // TRANSFORMAR EM ARRAY
  const lista = Object.entries(ranking)
    .map(([id, total]) => ({ id, total }))
    .sort((a,b)=>b.total - a.total);

  const posicao = lista.findIndex(x => x.id == motoristaId) + 1;

  const minhasCorridas = ranking[motoristaId] || 0;

  const lider = lista[0]?.total || 0;

  const falta = lider - minhasCorridas;

  // DATA FORMATADA
  function formatar(d){
    return new Date(d).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
  }

  // MENSAGEM INTELIGENTE
  let mensagem = "";

  if(posicao === 1){
    mensagem = "🔥 Você está liderando! Continue assim.";
  }else if(falta === 1){
    mensagem = "🚀 Falta 1 corrida para assumir a liderança.";
  }else{
    mensagem = `🚀 Faltam ${falta} corridas para liderar.`;
  }

  // RENDER
  document.getElementById("bonusCard").innerHTML = `
    <div class="bonus-content">
      <div class="bonus-title">🏆 Bônus semanal</div>

      <div class="bonus-value">
        ${posicao || "-"}º lugar • ${minhasCorridas} corridas
      </div>

      <div class="bonus-sub">
        ${mensagem}
      </div>

      <div class="bonus-sub" style="margin-top:6px">
        Seg-Sáb: ${formatar(dataInicio)} → ${formatar(dataFim)}
      </div>

      <div class="bonus-sub">
        Domingo: ${formatar(dataDomingo)}
      </div>

    </div>
  `;
}

/* MENU */
function abrirMenu(){
  menu.classList.add("ativo");
  menuOverlay.style.display="block";
}

function fecharMenu(){
  menu.classList.remove("ativo");
  menuOverlay.style.display="none";
}

function ir(p){
  window.location.href = p;
}

/* LOGIN */
function logout(){
  localStorage.clear();
  window.location.href = "login-motorista.html";
}

(function(){
  const id = localStorage.getItem("motorista_id");
  if(!id) logout();
})();

/* USUÁRIO */
const motoristaId = localStorage.getItem("motorista_id");
const nome = localStorage.getItem("motorista_nome");

function primeiroNome(n){
  return n?.split(" ")[0] || "Motorista";
}

const hora = new Date().getHours();
let saudacao = hora < 12 ? "Bom dia" :
               hora < 18 ? "Boa tarde" : "Boa noite";

document.getElementById("saudacao").innerText =
`🚖 ${saudacao}, ${primeiroNome(nome)}!`;

document.getElementById("nomeMotorista").innerText = nome;

/* DADOS */
let corridas = [];
let corridasGeral = [];
let chart = null;

async function carregar(){

  const { data: todas } = await window.supabaseClient
    .from("corridas")
    .select("*");

  corridasGeral = todas || [];

  const { data } = await window.supabaseClient
    .from("corridas")
    .select("*")
    .eq("motorista_id", motoristaId)
    .order("data_viagem", { ascending:false });

  corridas = data || [];

  gerar();
  gerarGrafico();
}

/* FILTRO */
function filtrar(){

  const tipo = filtro.value;
  const hoje = new Date();

  if(tipo === "geral") return corridas;

  if(tipo === "semana"){
    const inicio = new Date();
    inicio.setDate(hoje.getDate() - hoje.getDay() + 1);

    const fim = new Date(inicio);
    fim.setDate(inicio.getDate() + 6);

    return corridas.filter(c=>{
      const d = new Date(c.data_viagem);
      return d >= inicio && d <= fim;
    });
  }

  if(tipo === "mes"){
    const mesAtual = hoje.toISOString().slice(0,7);
    return corridas.filter(c=>c.data_viagem?.startsWith(mesAtual));
  }

}

/* RESUMO */
function gerar(){

  const listaFiltrada = filtrar();

  let total = 0;
  let finalizadas = 0;
  let canceladas = 0;

  listaFiltrada.forEach(c=>{
    const status = (c.status || "").toLowerCase().trim();

if(status === "finalizada"){
      total += Number(c.valor);
      finalizadas++;
    }else{
      canceladas++;
    }
  });

  const naoAtendidas = corridasGeral.filter(c =>
    c.motorista_id !== motoristaId
  ).length;

  const media = listaFiltrada.length ? total / listaFiltrada.length : 0;

resumo.innerHTML
lista.innerHTML = "";

  listaFiltrada.forEach(c=>{

    let rota = `${c.origem} → ${c.destino}`;
    if(c.parada){
      rota = `${c.origem} → 🛑 ${c.parada} → ${c.destino}`;
    }

    lista.innerHTML += `
      <div class="item-corrida">
        <div class="rota">${rota}</div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2)}</div>
        <div class="data">
          ${c.data_viagem || "-"} • ${c.hora_viagem || "-"}
        </div>
      </div>
    `;
  });

}

/* GRÁFICO */
function gerarGrafico(){

  let finalizadas = 0;
  let canceladas = 0;

listaFiltrada.forEach(c=>{

  const status = (c.status || "").toLowerCase().trim();

  if(status === "finalizada"){
    total += Number(c.valor);
    finalizadas++;
  }else if(status === "cancelada"){
    canceladas++;
  }

});

  const naoAtendidas = corridasGeral.filter(c =>
    c.motorista_id !== motoristaId
  ).length;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: ["Finalizadas", "Canceladas", "Não atendidas"],
      datasets: [{
        data: [finalizadas, canceladas, naoAtendidas]
      }]
    }
  });

}

filtro.onchange = gerar;

carregar();
carregarBonus();

</script>

</body>
</html>
