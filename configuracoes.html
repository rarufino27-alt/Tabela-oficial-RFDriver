<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - RF</title>

<link rel="stylesheet" href="theme/theme.css">
<link rel="stylesheet" href="theme/layout.css">
<link rel="stylesheet" href="theme/components.css">

<style>

/* BASE GLOBAL (ESSENCIAL) */
body{
  background:var(--bg-main);
  color:var(--text-primary);
  transition: background .25s, color .25s;
}

/* HEADER CORRIGIDO */
.top-white{
  background:var(--bg-card);
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  padding:10px 16px;
}

.logo-text-dark{
  color:var(--text-primary);
}

/* TÍTULO */
.page-title{
  font-size:22px;
  font-weight:800;
  text-align:center;
  margin:20px 0 10px;
}

/* SUBTÍTULO */
.section-title{
  font-size:14px;
  color:var(--text-secondary);
  margin-bottom:10px;
}

/* CARD PREMIUM */
.card-modern{
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;

  background:var(--bg-card);
  border:1px solid var(--border);

  box-shadow:0 12px 30px rgba(0,0,0,.12);

  transition:.2s;
}

.card-modern:hover{
  transform:translateY(-2px);
}

/* OPÇÕES */
.option-modern{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-radius:12px;
  cursor:pointer;

  transition:.2s;
}

.option-modern:last-child{
  border:none;
}

.option-modern:hover{
  background:var(--bg-soft);
}

/* BADGE */
.badge{
  background:linear-gradient(135deg,#facc15,#fde047);
  color:#000;
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

/* VOLTAR */
.voltar{
  text-align:center;
  margin-top:25px;
  color:var(--primary);
  font-weight:700;
  cursor:pointer;
}

  .app-container{
  padding:16px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="top-white">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text-dark">RF MOTORISTA</span>
  </div>
</div>

<div class="app-container">

<div class="page-title">⚙️ Configurações</div>

<!-- PREFERÊNCIAS -->
<div class="card-modern">

  <div class="section-title">Preferências</div>

<div class="option-modern" onclick="alternarTema()">
  <span>🎨 Tema</span>
  <strong id="temaAtual"></strong>
</div>

</div>

<!-- SISTEMA -->
<div class="card-modern">

  <div class="section-title">Sistema</div>

  <div class="option-modern">
    <span>Versão do aplicativo</span>
    <span class="badge">1.0.1</span>
  </div>

<div class="option-modern" onclick="abrirSuporte()">
  <span>💬 Suporte</span>
  <span>WhatsApp</span>
</div>

</div>

<div class="voltar" onclick="window.location.href='index.html'">
← Voltar
</div>

</div>

<script>

/* =========================
CARREGAR TEMA GLOBAL (ANTES DO RENDER)
========================= */
(function(){

  const temaSalvo = localStorage.getItem("rf_theme") || "dark";

  // aplica no HTML antes de tudo (mais rápido que body)
  document.documentElement.setAttribute("data-theme", temaSalvo);

  // garante aplicação no body quando existir
  document.addEventListener("DOMContentLoaded", () => {
    document.body.setAttribute("data-theme", temaSalvo);

    // só chama se existir (evita erro em outras páginas)
    if(typeof atualizarLabel === "function"){
      atualizarLabel();
    }
  });

})();

/* =========================
ALTERNAR TEMA
========================= */
function alternarTema(){

  const atual = document.documentElement.getAttribute("data-theme") || "dark";
  const novo = atual === "dark" ? "light" : "dark";

  // aplica no HTML e body (garantia total)
  document.documentElement.setAttribute("data-theme", novo);
  document.body.setAttribute("data-theme", novo);

  localStorage.setItem("rf_theme", novo);

  if(typeof atualizarLabel === "function"){
    atualizarLabel();
  }

/* =========================
LABEL
========================= */
function atualizarLabel(){

  const atual = document.body.getAttribute("data-theme");

  document.getElementById("temaAtual").innerText =
    atual === "dark" ? "🌙 Escuro" : "☀️ Claro";
}

/* =========================
SUPORTE
========================= */
function abrirSuporte(){

  const mensagem = encodeURIComponent("Olá, preciso de suporte no aplicativo RF.");
  window.open(`https://wa.me/5581989823239?text=${mensagem}`, "_blank");
}

</script>

</body>
</html>
