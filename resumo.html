<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Resumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
THEME
========================= */
:root{
--bg:#0f0f0f;
--card:#1c1c1c;
--text:#fff;
--soft:#aaa;
--border:rgba(255,255,255,.08);
--primary:#facc15;
--green:#22c55e;
--red:#ef4444;
}

body[data-theme="light"]{
--bg:#f3f3f3;
--card:#fff;
--text:#111;
--soft:#666;
--border:rgba(0,0,0,.08);
}

/* =========================
BASE
========================= */
body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,Roboto;
}

.container{
max-width:420px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:14px;
}

/* =========================
CARD
========================= */
.card{
background:var(--card);
border-radius:18px;
padding:16px;
border:1px solid var(--border);
}

/* =========================
ROTA
========================= */
.rota{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.rota-box{
flex:1;
padding:12px;
border-radius:14px;
border:2px solid;
}

.origem{
border-color:var(--green);
}

.destino{
border-color:var(--red);
}

.label{
font-size:12px;
color:var(--soft);
}

.valor{
font-weight:bold;
}

/* =========================
SEÇÕES
========================= */
.titulo{
font-weight:700;
margin-bottom:10px;
}

/* =========================
LINHAS
========================= */
.linha{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:14px;
}

/* =========================
TOTAL
========================= */
.total-box{
display:flex;
justify-content:space-between;
align-items:center;
}

.total-valor{
font-size:26px;
font-weight:bold;
color:var(--primary);
}

/* =========================
BOTÕES
========================= */
.btn{
flex:1;
padding:14px;
border-radius:12px;
border:none;
font-weight:bold;
}

.btn-wpp{
background:#16a34a;
color:#fff;
}

.btn-pdf{
background:var(--primary);
color:#000;
}

.btn-row{
display:flex;
gap:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- ROTA -->
<div class="card rota">
  <div class="rota-box origem">
    <div class="label">Origem</div>
    <div class="valor" id="origem"></div>
  </div>

  →

  <div class="rota-box destino">
    <div class="label">Destino</div>
    <div class="valor" id="destino"></div>
  </div>
</div>

<!-- DETALHES -->
<div class="card">
<div class="titulo">Detalhes selecionados</div>

<div class="linha">
<span>Veículo</span>
<span id="veiculo"></span>
</div>

<div class="linha">
<span>Embarque</span>
<span id="embarque"></span>
</div>

<div class="linha">
<span>Desembarque</span>
<span id="desembarque"></span>
</div>

<div class="linha">
<span>Obs</span>
<span id="obs"></span>
</div>

</div>

<!-- TAXAS -->
<div class="card">
<div class="titulo">Taxas adicionais</div>
<div id="taxas"></div>
</div>

<!-- PAGAMENTO -->
<div class="card">
<div class="titulo">Forma de pagamento</div>

<select id="pagamento">
<option value="dinheiro">Dinheiro</option>
<option value="pix">PIX</option>
<option value="credito">Crédito</option>
<option value="debito">Débito</option>
</select>

</div>

<!-- TOTAL -->
<div class="card total-box">
<div>
<div class="label">Total da viagem</div>
<div class="total-valor" id="total"></div>
</div>

<div>
<div class="linha"><span>Base</span><span id="base"></span></div>
<div class="linha"><span>Taxas</span><span id="totalTaxas"></span></div>
</div>
</div>

<!-- BOTÕES -->
<div class="btn-row">
<button class="btn btn-wpp" onclick="wpp()">WhatsApp</button>
<button class="btn btn-pdf" onclick="pdf()">PDF</button>
</div>

</div>

<script>

/* THEME */
document.body.setAttribute("data-theme", localStorage.getItem("rf_theme") || "dark");

/* DADOS */
const d = JSON.parse(localStorage.getItem("rf_corrida_temp"));

if(!d) location.href="home.html";

/* PREENCHER */
origem.innerText = d.origem;
destino.innerText = d.destino;
veiculo.innerText = d.categoria > 1 ? "6 lugares" : "4 lugares";
embarque.innerText = d.embarque || "-";
desembarque.innerText = d.desembarque || "-";
obs.innerText = d.obs || "-";

/* TAXAS */
let taxasHTML = "";
let totalTaxas = 0;

if(d.feira > 0){
taxasHTML += `<div class="linha"><span>Feira</span><span>R$ ${(+d.feira).toFixed(2)}</span></div>`;
totalTaxas += +d.feira;
}

if(d.animal > 0){
taxasHTML += `<div class="linha"><span>Animal</span><span>R$ ${(+d.animal).toFixed(2)}</span></div>`;
totalTaxas += +d.animal;
}

if(d.saidaPraia > 0){
taxasHTML += `<div class="linha"><span>Praia</span><span>R$ ${(+d.saidaPraia).toFixed(2)}</span></div>`;
totalTaxas += +d.saidaPraia;
}

if(d.espera > 5){
let t = 3 + ((d.espera-5)*0.6);
taxasHTML += `<div class="linha"><span>Espera</span><span>R$ ${t.toFixed(2)}</span></div>`;
totalTaxas += t;
}

document.getElementById("taxas").innerHTML = taxasHTML;

/* TOTAL */
let base = +d.valor;
let total = base + totalTaxas;

function atualizar(){

let pagamento = pagamentoSelect.value;

let final = total;

if(pagamento === "credito") final = total / 0.95;
if(pagamento === "debito") final = total / 0.98;

document.getElementById("total").innerText = "R$ " + final.toFixed(2);
document.getElementById("base").innerText = "R$ " + base.toFixed(2);
document.getElementById("totalTaxas").innerText = "+ R$ " + totalTaxas.toFixed(2);

}

const pagamentoSelect = document.getElementById("pagamento");
pagamentoSelect.addEventListener("change", atualizar);

atualizar();

/* AÇÕES */
function wpp(){
window.open("https://wa.me/?text=Orçamento RF");
}

function pdf(){
alert("PDF aqui");
}

</script>

</body>
</html>
